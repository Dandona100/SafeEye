services:
  safeeye:
    build: .
    container_name: safeeye
    restart: unless-stopped
    ports:
      - "1985:1985"
    env_file:
      - .env
    environment:
      - BEHIND_NGINX=1
    volumes:
      - ./data:/app/data
      - /etc/nginx:/etc/nginx
      - /usr/sbin/nginx:/usr/sbin/nginx:ro
      - ./nsfw_scanner/static:/app/nsfw_scanner/static
      - ./nsfw_scanner:/app/nsfw_scanner
      - ./.git:/app/.git
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1500M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1985/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
