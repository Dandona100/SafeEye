services:
  safeeye:
    build: .
    container_name: safeeye
    restart: unless-stopped
    ports:
      - "1985:1985"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1500M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1985/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
