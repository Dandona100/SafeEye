name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: Run tests
        run: pytest nsfw_scanner/tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t safeeye .

      - name: Health check
        run: |
          echo "SCAN_API_MASTER_TOKEN=test123" > .env
          docker compose up -d
          sleep 30
          curl -f http://localhost:1985/health
          docker compose down
