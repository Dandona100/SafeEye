function DomainTab({ api, i18n }) {
    const [config, setConfig] = useState(null);
    const [mode, setMode] = useState('domain');
    const [domain, setDomain] = useState('');
    const [baseDomain, setBaseDomain] = useState('');
    const [pathPrefix, setPathPrefix] = useState('');
    const [cfToken, setCfToken] = useState('');
    const [dns, setDns] = useState(null);
    const [status, setStatus] = useState('');
    const [step, setStep] = useState(1);

    const he = i18n.lang === 'he';

    useEffect(() => {
        api.fetchApi('/api/v1/admin/domain').then(d => {
            setConfig(d);
            if (d.domain) { setDomain(d.domain); setStep(3); }
        }).catch(() => {});
    }, []);

    const detectDns = async () => {
        if (!domain.trim()) return;
        // If user entered a path like example.com/path, switch to path mode
        if (domain.includes('/')) {
            const parts = domain.split('/');
            setBaseDomain(parts[0]);
            setPathPrefix(parts.slice(1).join('/'));
            setMode('path');
            setDomain('');
            return;
        }
        setStatus(he ? '🔍 סורק DNS...' : '🔍 Detecting DNS...');
        const res = await api.postApi('/api/v1/admin/domain/detect-dns', { domain });
        setDns(res);
        setStep(2);
        setStatus('');
    };

    const setupAuto = async () => {
        if (!cfToken.trim()) { setStatus('⚠️ Cloudflare token required'); setTimeout(() => setStatus(''), 3000); return; }
        setStatus(he ? '🔄 מגדיר DNS...' : '🔄 Setting up DNS...');
        const res = await api.postApi('/api/v1/admin/domain/setup-dns', { domain, cloudflare_token: cfToken });
        if (res.status === 'ok') {
            setStatus(`✅ DNS ${res.action}! ${domain} → ${res.ip}`);
            setupNginx();
        } else {
            setStatus(`❌ ${res.message}`);
        }
    };

    const setupNginx = async () => {
        setStatus(s => s + (he ? '\n🔄 מגדיר nginx + SSL...' : '\n🔄 Setting up nginx + SSL...'));
        const res = await api.postApi('/api/v1/admin/domain/setup-nginx', { domain });
        if (res.status === 'ok') {
            setStatus(`✅ ${he ? 'הכל מוגדר!' : 'All configured!'} https://${domain}/dashboard`);
            setStep(3);
        } else if (res.status === 'manual_required' || res.manual) {
            setStatus(`⚠️ ${he ? 'נדרשת הרצה ידנית:' : 'Manual setup required:'}\n${res.command || res.manual}`);
            setStep(3);
        } else {
            setStatus(`❌ ${res.message}`);
        }
    };

    const disconnect = async () => {
        await api.postApi('/api/v1/admin/domain/setup-dns', { domain: '', cloudflare_token: '' });
        setDomain(''); setDns(null); setStep(1); setCfToken(''); setConfig(null);
        setStatus(he ? '🔌 דומיין נותק' : '🔌 Domain disconnected');
        setTimeout(() => setStatus(''), 3000);
    };

    if (!config) return <div className="text-muted py-8 text-center">{i18n.t('loading')}</div>;

    const providerNames = {
        cloudflare: 'Cloudflare', route53: 'Amazon Route53', google: 'Google Domains',
        godaddy: 'GoDaddy', namecheap: 'Namecheap', unknown: he ? 'לא זוהה' : 'Unknown',
    };

    return (
        <div className="space-y-6">
            {/* Header */}
            <div className="card p-6 text-center" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <div className="text-3xl mb-2">🌐</div>
                <h3 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{he ? 'חיבור דומיין' : 'Connect Domain'}</h3>
                <p className="text-muted text-sm mt-1">{he ? 'חברו את SafeEyes לדומיין שלכם לגישה מכל מקום' : 'Connect SafeEyes to your domain for access from anywhere'}</p>
            </div>
            {/* Server info */}
            <div className="card p-5">
                <div className="detail-row"><span className="detail-label">Server IP</span><span className="detail-value font-mono">{config.server_ip}</span></div>
                <div className="detail-row"><span className="detail-label">Port</span><span className="detail-value">{config.port}</span></div>
                {config.domain && <div className="detail-row"><span className="detail-label">{he ? 'דומיין פעיל' : 'Active domain'}</span><span className="detail-value text-green-600">{config.domain}</span></div>}
            </div>

            {step === 3 && config.domain ? (
                /* Connected state */
                <div className="card p-4">
                    <div className="flex justify-between items-center mb-3">
                        <span className="font-medium">🌐 {config.domain}</span>
                        <span className="px-2 py-0.5 rounded text-xs text-white badge-safe">{he ? 'מחובר' : 'Connected'}</span>
                    </div>
                    <div className="space-y-1 text-sm text-muted mb-3" dir="ltr">
                        <div>Dashboard: <a href={`https://${config.domain}/dashboard`} target="_blank" className="text-gold-dark">https://{config.domain}/dashboard</a></div>
                        <div>API: <span className="text-ink">https://{config.domain}/api/v1/</span></div>
                    </div>
                    <button className="btn btn-red text-xs" onClick={disconnect}>🔌 {he ? 'נתק דומיין' : 'Disconnect domain'}</button>
                </div>
            ) : (
                /* Setup flow */
                <div className="card p-4">
                    <h3 className="font-medium mb-1">🌐 {he ? 'חיבור דומיין' : 'Connect Domain'}</h3>
                    <p className="text-muted/70 text-xs mb-4">{he
                        ? 'חברו את SafeEyes לדומיין שלכם כדי לגשת לדשבורד ול-API מכל מקום עם HTTPS.'
                        : 'Connect SafeEyes to your domain to access the dashboard and API from anywhere with HTTPS.'}</p>

                    {/* Mode selection */}
                    <div className="flex gap-2 mb-3">
                        <button className={`btn flex-1 text-xs ${mode === 'domain' ? 'btn-blue' : 'btn-gray'}`}
                            onClick={() => { setMode('domain'); setStep(1); setDns(null); }}>
                            🌐 {he ? 'דומיין / סאב-דומיין' : 'Domain / Subdomain'}
                        </button>
                        <button className={`btn flex-1 text-xs ${mode === 'path' ? 'btn-blue' : 'btn-gray'}`}
                            onClick={() => { setMode('path'); setStep(1); setDns(null); }}>
                            📁 {he ? 'נתיב בדומיין קיים' : 'Path on existing domain'}
                        </button>
                    </div>

                    {mode === 'path' ? (
                        /* Path mode: liviatchen.com/scanner */
                        <div className="space-y-3">
                            <p className="text-muted text-xs">{he
                                ? 'הוסיפו את SafeEyes כנתיב בדומיין שכבר מוגדר אצלכם בנגינקס (למשל: example.com/scanner).'
                                : 'Add SafeEyes as a path on a domain already configured in your nginx (e.g. example.com/scanner).'}</p>
                            <input className="input" placeholder={he ? 'דומיין קיים (example.com)' : 'Existing domain (example.com)'}
                                value={baseDomain} onChange={e => setBaseDomain(e.target.value)} dir="ltr" />
                            <div className="flex items-center gap-1" dir="ltr">
                                <span className="text-muted/70 text-sm">{baseDomain || 'example.com'} /</span>
                                <input className="input flex-1" placeholder={he ? 'נתיב (scanner)' : 'path (scanner)'}
                                    value={pathPrefix} onChange={e => setPathPrefix(e.target.value.replace(/^\//, ''))} dir="ltr" />
                            </div>
                            {baseDomain && pathPrefix && (
                                <PathSetup api={api} i18n={i18n} baseDomain={baseDomain} pathPrefix={pathPrefix} port={config.port}
                                    onDone={(full) => { setStep(3); setDomain(full); api.fetchApi('/api/v1/admin/domain').then(setConfig); }} />
                            )}
                        </div>
                    ) : (
                        /* Domain mode */
                        <div>
                            {/* Step 1: Enter domain */}
                            <p className="text-muted text-xs mb-2">{he
                                ? 'הכניסו דומיין או סאב-דומיין (למשל: scanner.example.com).'
                                : 'Enter a domain or subdomain (e.g. scanner.example.com).'}</p>
                            <div className="flex gap-2 mb-3">
                                <input className="input flex-1" placeholder="scanner.example.com"
                                    value={domain} onChange={e => setDomain(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && detectDns()} dir="ltr" />
                                <button className="btn btn-blue" onClick={detectDns}>{he ? 'סרוק' : 'Detect'}</button>
                            </div>

                            {/* Step 2: DNS detected */}
                            {dns && step >= 2 && (
                                <div className="fade-in space-y-3">
                                    <div className="bg-warm rounded p-3 text-sm">
                                        <div className="detail-row"><span className="detail-label">DNS Provider</span><span className="detail-value">{providerNames[dns.provider] || dns.provider}</span></div>
                                        <div className="detail-row"><span className="detail-label">NS Records</span><span className="detail-value text-xs font-mono">{(dns.ns_records||[]).join(', ') || '-'}</span></div>
                                    </div>

                                    {dns.auto_dns_supported ? (
                                        <div>
                                            <p className="text-green-600 text-sm mb-2">✅ {he ? 'Cloudflare זוהה! ניתן להגדיר אוטומטית.' : 'Cloudflare detected! Auto-setup available.'}</p>
                                            <input className="input mb-2" type="password" dir="ltr"
                                                placeholder="Cloudflare API Token (Edit zone DNS)"
                                                value={cfToken} onChange={e => setCfToken(e.target.value)} />
                                            <a href="https://dash.cloudflare.com/profile/api-tokens" target="_blank" rel="noopener"
                                                className="text-gold-dark hover:text-gold text-xs mb-2 inline-block">
                                                {he ? '→ צור API Token ב-Cloudflare' : '→ Create API Token in Cloudflare'}
                                            </a>
                                            <button className="btn btn-green w-full" onClick={setupAuto}>
                                                ⚡ {he ? 'הגדר אוטומטית (DNS + Nginx + SSL)' : 'Auto Setup (DNS + Nginx + SSL)'}
                                            </button>
                                        </div>
                                    ) : (
                                        <div>
                                            <p className="text-amber-600 text-sm mb-2">📋 {he ? 'הגדרה ידנית — הוסיפו רשומת A:' : 'Manual setup — add an A record:'}</p>
                                            <div className="bg-ink rounded p-3 font-mono text-sm text-gray-300 mb-2" dir="ltr">
                                                <div>Type: <b>A</b></div>
                                                <div>Name: <b>{domain}</b></div>
                                                <div>Value: <b>{config.server_ip}</b></div>
                                                <div>TTL: <b>Auto</b></div>
                                            </div>
                                            <p className="text-muted/70 text-xs mb-2">{he ? 'אחרי שהוספתם את הרשומה, בחרו:' : 'After adding the record, choose:'}</p>
                                            <div className="flex gap-2">
                                                <button className="btn btn-green flex-1" onClick={setupNginx}>
                                                    🔧 {he ? 'Nginx + SSL' : 'Nginx + SSL'}
                                                </button>
                                                <button className="btn btn-blue flex-1" onClick={async () => {
                                                    const res = await api.postApi('/api/v1/admin/domain/setup-direct', { domain });
                                                    if (res.status === 'ok') {
                                                        setStatus(`✅ ${he ? 'נשמר!' : 'Saved!'}\n${res.access_url}`);
                                                        setStep(3);
                                                        api.fetchApi('/api/v1/admin/domain').then(setConfig);
                                                    } else setStatus(`❌ ${res.message}`);
                                                }}>
                                                    🌐 {he ? 'ישיר (בלי Nginx)' : 'Direct (no Nginx)'}
                                                </button>
                                            </div>
                                            <p className="text-line text-xs mt-2">{he
                                                ? '💡 "ישיר" — DNS בלבד, גישה דרך http://domain:port. מתאים ל-VPS בלי nginx.'
                                                : '💡 "Direct" — DNS only, access via http://domain:port. For VPS without nginx.'}</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )}

            {status && <div className="card p-3 text-sm whitespace-pre-line">{status}</div>}

            <TelegramVerify api={api} i18n={i18n} />

            {/* SSH Tunnel — auto-detect user+IP */}
            <SshTunnelCard api={api} i18n={i18n} />
        </div>
    );
}

/* ========== APP ========== */
function UpdateBanner({ api, i18n }) {
    const [update, setUpdate] = useState(null);
    const [dismissed, setDismissed] = useState(false);
    const he = i18n.lang === 'he';
    useEffect(() => {
        api.fetchApi('/api/v1/admin/check-update').then(data => {
            if (data.status === 'ok' && data.update_available) {
                const lastDismissed = localStorage.getItem('safeeye_last_sha');
                if (lastDismissed !== data.remote_sha) setUpdate(data);
            }
        }).catch(() => {});
    }, []);
    if (!update || dismissed) return null;
    return (
        <div style={{ background: '#FFF8E1', border: '1px solid #C9A962', borderRadius: '10px', padding: '12px 16px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', direction: 'ltr' }}>
            <div>
                <span style={{ fontWeight: 600, color: '#A68B4B' }}>🔄 {he ? 'גרסה חדשה זמינה!' : 'New version available!'}</span>
                <span style={{ color: '#7A7A7A', fontSize: '0.8rem', marginLeft: '8px' }}>{update.remote_sha} — {update.remote_message?.substring(0, 50)}</span>
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
                <button className="btn btn-blue text-xs" onClick={() => { setDismissed(true); localStorage.setItem('safeeye_last_sha', update.remote_sha); window.location.hash = 'about'; }}>
                    {he ? 'עדכון' : 'Update'}
                </button>
                <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#7A7A7A' }} onClick={() => { setDismissed(true); localStorage.setItem('safeeye_last_sha', update.remote_sha); }}>✕</button>
            </div>
        </div>
    );
}

function App() {
    const api = useApi();
    const i18n = useI18n();
    const [tab, setTabState] = useState(window.location.hash.replace('#','') || 'overview');
    const setTab = (t) => { setTabState(t); window.location.hash = t; };
    const [authed, setAuthed] = useState(!!api.token);

    useEffect(() => { setAuthed(!!api.token); }, [api.token]);
    useEffect(() => { document.documentElement.lang = i18n.lang; }, [i18n.lang]);

    if (!authed) return <LoginScreen onLogin={(t) => { api.saveToken(t); setAuthed(true); }} i18n={i18n} />;

    const isDemo = api.token === '_demo_';
    const allTabs = [
        { id: 'overview', label: i18n.lang === 'he' ? 'דשבורד' : 'Dashboard', icon: '📊' },
        { id: 'history', label: i18n.t('history'), icon: '📋' },
        { id: 'providers', label: i18n.t('providers'), icon: '⚙️' },
        { id: 'tokens', label: i18n.t('tokens'), icon: '🔑', admin: true },
        { id: 'integrations', label: i18n.t('integrations'), icon: '🔗', admin: true },
        { id: 'docs', label: 'API', icon: '📚' },
        { id: 'network', label: i18n.lang === 'he' ? 'רשת' : 'Network', icon: '🌍', admin: true },
        { id: 'domain', label: i18n.lang === 'he' ? 'דומיין' : 'Domain', icon: '🌐', admin: true },
        { id: 'community', label: i18n.lang === 'he' ? 'קהילה' : 'Community', icon: '🏘️' },
        { id: 'about', label: i18n.t('about'), icon: '💡' },
    ];
    const tabs = isDemo ? allTabs.filter(t => !t.admin) : allTabs;

    return (
        <div className="max-w-7xl mx-auto px-4 sm:px-8 py-4 sm:py-6" dir="ltr">
            <div className="flex justify-between items-center mb-4 sm:mb-6 px-1">
                <div className="flex items-center gap-2">
                    <span className="text-xl sm:text-2xl">🛡️</span>
                    <h1 className="text-lg sm:text-xl font-bold">{i18n.t('title')}</h1>
                    <span className="text-xs text-line hidden sm:inline">v{VERSION}</span>
                </div>
                <div className="flex items-center gap-2 sm:gap-3">
                    <ThemeToggle />
                    <LangSwitch i18n={i18n} />
                    {!isDemo && <button className="text-muted hover:text-ink text-xs sm:text-sm" onClick={() => { api.clearToken(); setAuthed(false); }}>{i18n.t('logout')}</button>}
                </div>
            </div>
            <div style={{ display: 'flex', flexDirection: i18n.isRtl ? 'row-reverse' : 'row', gap: '0px', borderBottom: '1px solid #E5E2DD', marginBottom: '16px', padding: '0 4px', overflowX: 'auto' }}>
                {tabs.map(t => (
                    <button key={t.id} style={{ flex: 1, textAlign: 'center', paddingBottom: '8px', fontSize: '0.8rem', fontWeight: 500, cursor: 'pointer', border: 'none', background: 'none', borderBottom: tab === t.id ? '2px solid #C9A962' : '2px solid transparent', color: tab === t.id ? '#A68B4B' : '#7A7A7A' }}
                        onClick={() => setTab(t.id)}>
                        <div style={{ fontSize: '1rem' }}>{t.icon}</div>
                        <div>{t.label}</div>
                    </button>
                ))}
            </div>
            <UpdateBanner api={api} i18n={i18n} />
            <div className="content-bidi" data-dir={i18n.isRtl ? 'rtl' : 'ltr'}>
            {tab === 'overview' && <OverviewTab api={api} i18n={i18n} />}
            {tab === 'providers' && <ProvidersTab api={api} i18n={i18n} onNavigate={setTab} />}
            {tab === 'history' && <HistoryTab api={api} i18n={i18n} />}
            {tab === 'tokens' && <TokensTab api={api} i18n={i18n} />}
            {tab === 'integrations' && <IntegrationsTab api={api} i18n={i18n} />}
            {tab === 'docs' && <ApiDocsTab api={api} i18n={i18n} onNavigate={setTab} />}
            {tab === 'network' && <NetworkTab api={api} i18n={i18n} />}
            {tab === 'domain' && <DomainTab api={api} i18n={i18n} />}
            {tab === 'community' && <ReportTab api={api} i18n={i18n} />}
            {tab === 'about' && <AboutTab api={api} i18n={i18n} />}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
