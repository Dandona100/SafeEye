function useI18n() {
    const [lang, setLang] = useState(localStorage.getItem('scanner_lang') || 'he');
    const t = (key) => LANGS[lang]?.[key] || LANGS.en[key] || key;
    const switchLang = (l) => { setLang(l); localStorage.setItem('scanner_lang', l); };
    const isRtl = lang === 'he';
    return { t, lang, switchLang, isRtl };
}

function useApi() {
    const [token, setToken] = useState(localStorage.getItem('scanner_token') || '');
    const headers = { Authorization: `Bearer ${token}` };
    const saveToken = (t) => { setToken(t); localStorage.setItem('scanner_token', t); };
    const clearToken = () => { setToken(''); localStorage.removeItem('scanner_token'); };
    const fetchApi = async (path) => {
        const res = await fetch(`${API}${path}`, { headers });
        if (res.status === 401) { clearToken(); throw new Error('Unauthorized'); }
        return res.json();
    };
    const postApi = async (path, body) => {
        const res = await fetch(`${API}${path}`, {
            method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        return res.json();
    };
    return { token, saveToken, clearToken, fetchApi, postApi, headers };
}

function ThemeToggle() {
    const [dark, setDark] = useState(localStorage.getItem('scanner_theme') === 'dark');
    const toggle = () => {
        const next = !dark;
        setDark(next);
        document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
        localStorage.setItem('scanner_theme', next ? 'dark' : 'light');
    };
    return <button onClick={toggle} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.1rem', padding: '2px 6px' }}>{dark ? '☀️' : '🌙'}</button>;
}

function LangSwitch({ i18n }) {
    return (
        <div className="flex gap-1 text-xs">
            <button className={`px-2 py-0.5 rounded ${i18n.lang === 'he' ? 'bg-gold' : 'bg-warm'}`}
                onClick={() => i18n.switchLang('he')}>עב</button>
            <button className={`px-2 py-0.5 rounded ${i18n.lang === 'en' ? 'bg-gold' : 'bg-warm'}`}
                onClick={() => i18n.switchLang('en')}>EN</button>
        </div>
    );
}

                <p className="text-muted/70 text-xs mb-3">v{VERSION}</p>
                <div className="mb-4 flex items-center justify-center gap-2"><LangSwitch i18n={i18n} /><ThemeToggle /></div>
                <p className="text-muted mb-4 text-sm" dir={he ? 'rtl' : 'ltr'}>{he ? 'הכניסו את טוקן ה-API כדי להמשיך' : 'Enter your API token to continue'}</p>
                <input className="input mb-3" type="password" value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && onLogin(input)}
                    placeholder={i18n.t('token_placeholder')} autoFocus dir="ltr" />
                <button className="w-full btn btn-blue mb-3" onClick={() => onLogin(input)}>{i18n.t('login')}</button>

                    {he ? '❓ אין לי טוקן — מה עושים?' : '❓ No token? What do I do?'}

                    <div className="mt-3 p-4 bg-warm rounded-lg text-sm text-left" dir={he ? 'rtl' : 'ltr'}>

                            : '1. Find the Master Token in .env (SCAN_API_MASTER_TOKEN)'}</p>
                        <p className="text-muted text-xs mb-2">{he
                            ? '2. או צרו טוקן חדש דרך הטרמינל:'
                            : '2. Or create a new token via terminal:'}</p>

                        </div>
                        <p className="text-muted text-xs">{he

function SkeletonLoader({ type = 'card', count = 1 }) {
    const items = Array.from({ length: count });
    if (type === 'stats') return (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-stat rounded-xl"></div>)}
        </div>
    );
    if (type === 'cards') return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-card rounded-xl"></div>)}
        </div>
    );
    return (
        <div className="space-y-3">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-card rounded-xl"></div>)}
        </div>
    );
}

function ScanProgress({ status }) {
    const steps = [
        { key: 'download', label: '📥', pct: 20 },
        { key: 'providers', label: '🔍', pct: 60 },
        { key: 'voting', label: '🗳️', pct: 90 },
        { key: 'done', label: '✅', pct: 100 },
    ];
    const current = status === 'pending' ? 0 : status === 'processing' ? 1 : status === 'completed' ? 3 : 0;
    const pct = steps[current]?.pct || 0;
    return (
        <div>
            <div className="progress-bar" style={{ marginBottom: '8px' }}>
                <div className="progress-fill" style={{ width: `${pct}%` }}></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: '#7A7A7A' }}>
                {steps.map((s, i) => (
                    <span key={s.key} style={{ opacity: i <= current ? 1 : 0.3 }}>{s.label}</span>
                ))}
            </div>
        </div>
    );
}

function CopyBlock({ text, children }) {
    const [copied, setCopied] = useState(false);
    const copy = (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(text || '');
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
    };
    return (
        <div className="relative group">
            <div className="bg-ink rounded-lg p-3 font-mono text-xs text-gray-300" dir="ltr" style={{ paddingRight: '48px' }}>
                {children || text}
            </div>
            <button onClick={copy} className="absolute top-2 right-2 px-2 py-1 rounded text-xs transition-all"
                style={{ background: copied ? '#2D8A56' : '#333', color: copied ? 'white' : '#999', border: 'none', cursor: 'pointer' }}>
                {copied ? '✓' : '📋'}
            </button>
        </div>
    );
}

function tLabel(raw, lang) {
    const parts = raw.split(':');
    const key = parts[0];
    const conf = parts[1] ? ` (${Math.round(parseFloat(parts[1]) * 100)}%)` : '';
    const dict = LABEL_MAP[lang] || LABEL_MAP.en;
    return (dict[key] || key) + conf;
}

            type: 'bar',
            data: {
                labels: data.map(d => d.provider),

function HistoryTab({ api, i18n }) {
    const he = i18n.lang === 'he';

    const [expanded, setExpanded] = useState(null);

    useEffect(() => {
        api.fetchApi(`/api/v1/stats/history?limit=100&nsfw_only=${nsfw}`).then(setItems).catch(() => {});
    }, [nsfw]);

    const toggle = async (id) => {
        if (expanded === id) { setExpanded(null); setDetail(null); return; }
        setExpanded(id);
        try { setDetail(await api.fetchApi(`/api/v1/scan/${id}`)); } catch { setDetail(null); }
    };

    return (
        <div className="space-y-6">
            {/* Filter buttons */}
            <div className="card p-4 flex items-center gap-3">
                <span className="text-muted text-sm">{he ? 'סינון:' : 'Filter:'}</span>

                <button className={`btn ${nsfw ? 'btn-red' : 'btn-gray'}`} onClick={() => setNsfw(true)}>{i18n.t('nsfw_only')}</button>
                <span className="text-muted/70 text-xs" style={{ marginInlineStart: 'auto' }}>{items.length} {he ? 'תוצאות' : 'results'}</span>

            <div className="space-y-3">
                {items.map(s => (
                    <div key={s.scan_id} className={`card clickable ${expanded === s.scan_id ? 'card-expand' : ''}`} onClick={() => toggle(s.scan_id)}>
                        <div className="p-5 flex flex-col sm:flex-row sm:justify-between gap-2 sm:items-center">
                            <div className="flex items-center gap-3">
                                <div className="text-2xl">{s.is_nsfw ? '🚨' : '✅'}</div>

/* ========== TOKENS ========== */
function TokensTab({ api, i18n }) {
    const [tokens, setTokens] = useState([]);
    const [name, setName] = useState('');
    const [created, setCreated] = useState(null);

    const load = () => { api.fetchApi('/api/v1/admin/tokens').then(setTokens).catch(() => {}); };
    useEffect(() => { load(); }, []);

    const create = async () => {
        if (!name) return;
        const res = await fetch(`${API}/api/v1/admin/tokens`, {
            method: 'POST', headers: { ...api.headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
        });
        if (res.ok) { const d = await res.json(); setCreated(d.token); setName(''); load(); }
    };
    const revoke = async (e, n) => {
        e.stopPropagation();
        if (!confirm(`${i18n.t('confirm_revoke')} "${n}"?`)) return;
        await fetch(`${API}/api/v1/admin/tokens/${n}`, { method: 'DELETE', headers: api.headers });
        load();
    };

    return (
        <div className="space-y-6">
            <div className="card p-6" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <h3 className="font-bold text-ink mb-4" style={{ fontFamily: 'Playfair Display, serif' }}>🔑 {i18n.t('create_token')}</h3>
                <div className="flex gap-3">
                    <input className="input flex-1" value={name} onChange={e => setName(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && create()} placeholder={i18n.t('token_name')} />
                    <button className="btn btn-blue" onClick={create}>{i18n.t('create')}</button>
                </div>
                {created && (
                    <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
                        <div className="text-green-700 text-sm font-medium mb-2">{i18n.t('token_created')}</div>
                        <CopyBlock text={created}><span className="text-green-800 break-all">{created}</span></CopyBlock>
                    </div>
                )}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {tokens.map(t => (
                    <div key={t.name} className="card p-6">
                        <div className="flex items-center gap-3 mb-4">
                            <span className="text-2xl">🔑</span>
                            <div>
                                <h4 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{t.name}</h4>
                                <span className="text-muted text-xs">{t.scan_count} {i18n.t('scans')}</span>
                            </div>
                        </div>
                        <div className="space-y-2 text-sm">
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('created_at')}</span><span className="text-ink" dir="ltr">{new Date(t.created_at).toLocaleDateString()}</span></div>
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('expires')}</span><span className="text-ink">{t.expires_at ? new Date(t.expires_at).toLocaleDateString() : i18n.t('never')}</span></div>
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('last_used')}</span><span className="text-ink">{t.last_used ? new Date(t.last_used).toLocaleDateString() : i18n.t('never')}</span></div>
                        </div>
                        <button className="btn btn-red text-xs mt-4" onClick={(e) => revoke(e, t.name)}>{i18n.t('revoke')}</button>
                    </div>
                ))}
            </div>
            {tokens.length === 0 && <div className="card p-10 text-center"><div className="text-4xl mb-3">🔑</div><p className="text-muted">{i18n.t('no_tokens')}</p></div>}
        </div>
    );
}

function IntegrationsTab({ api, i18n }) {
    const [providers, setProviders] = useState(null);
    const [forms, setForms] = useState({});
    const [msg, setMsg] = useState('');
    const [fieldErrors, setFieldErrors] = useState({});

    const reload = () => { api.fetchApi('/api/v1/admin/providers').then(setProviders).catch(() => {}); };
    useEffect(() => { reload(); }, []);

    const connect = async (def) => {
        const body = {};
        const errors = {};
        for (const f of def.fields) {
            const val = (forms[f.k] || '').trim();
            if (!val) { errors[f.k] = true; }
            else { body[f.k] = val; }
        }
        if (Object.keys(errors).length > 0) { setFieldErrors(errors); return; }
        setFieldErrors({});
        const res = await api.postApi('/api/v1/admin/providers', body);
        setMsg(res.status === 'ok' ? '✅' : '❌');
        setForms({});
        reload();
        setTimeout(() => setMsg(''), 3000);
    };

    const disconnect = async (key) => {
        await api.postApi('/api/v1/admin/providers/disconnect', { provider: key });
        setMsg('🔌');
        reload();
        setTimeout(() => setMsg(''), 2000);
    };

    if (!providers) return <div className="text-muted py-8 text-center">{i18n.t('loading')}</div>;

    const Badge = ({ ok }) => <span className={`px-2 py-0.5 rounded text-xs text-white ${ok ? 'badge-safe' : 'bg-slate-600'}`}>{ok ? i18n.t('connected') : i18n.t('not_connected')}</span>;
    const signupText = i18n.lang === 'he' ? '→ הרשמה והשגת מפתח' : '→ Sign up & get API key';

    const he = i18n.lang === 'he';
    return (
        <div className="space-y-6">
            <div className="card p-6 text-center" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <div className="text-3xl mb-2">🔗</div>
                <h3 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{he ? 'חיבור ספקי סריקה' : 'Connect Scan Providers'}</h3>
                <p className="text-muted text-sm mt-1">{he ? 'חברו ספקים נוספים לסריקה מדויקת יותר' : 'Connect additional providers for better accuracy'}</p>
            </div>
            {msg && <div className="text-center text-lg">{msg}</div>}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {PROVIDER_DEFS.map(def => {
                    const isConnected = def.local || providers[def.key]?.configured;
                    return (
                        <div key={def.key} className="card p-6">
                            <div className="flex items-center gap-3 mb-3">
                                <span className="text-2xl">{def.icon}</span>
                                <div className="flex-1">
                                    <h4 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{def.key}</h4>
                                </div>
                                <span className={`px-3 py-1 rounded-full text-xs font-medium ${isConnected ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-warm text-muted border border-line'}`}>
                                    {isConnected ? (he ? '✅ מחובר' : '✅ Connected') : (he ? 'לא מחובר' : 'Not connected')}
                                </span>
                            </div>
                            {def.local ? (
                                <p className="text-muted text-sm">{he ? 'מודל מקומי, תמיד פעיל. לא צריך טוקן.' : 'Local model, always active. No API key needed.'}</p>
                            ) : isConnected ? (
                                <div>
                                    <p className="text-green-600 text-sm mb-3">{he ? 'מחובר ופעיל' : 'Connected and active'}</p>
                                    <button className="btn btn-red text-xs" onClick={() => disconnect(def.key)}>{he ? '🔌 נתק' : '🔌 Disconnect'}</button>
                                </div>
                            ) : (
                                <div>
                                    <p className="text-muted text-sm mb-2">{he ? def.desc_he : def.desc_en}</p>
                                    {def.link && <a href={def.link} target="_blank" rel="noopener" className="text-gold-dark hover:text-gold text-xs mb-3 inline-block">{he ? '→ הרשמה והשגת מפתח' : '→ Sign up & get API key'}</a>}
                                    <div className="space-y-2">
                                        {def.fields.map(f => (
                                            <div key={f.k}>
                                                <input className={`input ${fieldErrors[f.k] ? 'border-red-500' : ''}`} type={f.pw ? 'password' : 'text'}
                                                    placeholder={f.ph} value={forms[f.k] || ''}
                                                    onChange={e => { setForms({...forms, [f.k]: e.target.value}); setFieldErrors({...fieldErrors, [f.k]: false}); }} dir="ltr" />
                                                {fieldErrors[f.k] && <p className="text-red-600 text-xs mt-0.5">{he ? 'שדה חובה' : 'Required'}</p>}

                                    </div>

        </div>

}

                        setUpdating(true);

                        const res = await api.postApi('/api/v1/admin/deploy', {});
                        if (res.status === 'deploying') {
                            setUpdateStatus(he ? '🔄 העדכון החל. הדף יתרענן תוך 30 שניות...' : '🔄 Update started. Page will refresh in 30s...');

            )}
            {status && status.status === 'error' && (
                <div className="text-red-600 text-sm">{status.message}</div>

    );

/* ========== API DOCS with Terminal ========== */
function ApiDocsTab({ api, i18n, onNavigate }) {
    const he = i18n.lang === 'he';
    const baseUrl = window.location.origin;
    const [termOpen, setTermOpen] = useState(false);
    const [termLog, setTermLog] = useState([]);
    const [termInput, setTermInput] = useState('');
    const [sandboxToken, setSandboxToken] = useState(localStorage.getItem('sandbox_token') || '');
    const [loading, setLoading] = useState(false);
    const termRef = useRef(null);

    // Auto-create sandbox token
    useEffect(() => {
        if (!sandboxToken) {
            api.postApi('/api/v1/sandbox/token', {}).then(res => {
                if (res.token) { setSandboxToken(res.token); localStorage.setItem('sandbox_token', res.token); }
            }).catch(() => {});
        }
    }, []);

    const log = (text, type = 'output') => {
        setTermLog(prev => [...prev, { text, type, time: new Date().toLocaleTimeString() }]);
        setTimeout(() => { if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight; }, 50);
    };

    const runInTerminal = async (cmd) => {
        setTermOpen(true);
        log(`$ ${cmd}`, 'cmd');
        setLoading(true);
        const token = sandboxToken;

        try {
            if (cmd.startsWith('scan file ') || cmd.startsWith('scan url ')) {
                const isUrl = cmd.startsWith('scan url ');
                const target = cmd.replace(/^scan (file|url) /, '');

                if (isUrl) {
                    const resp = await fetch(`${baseUrl}/api/v1/sandbox/scan?scan_url=${encodeURIComponent(target)}`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: '{}',
                    });
                    // Actually use the scan/url endpoint
                    const resp2 = await fetch(`${baseUrl}/api/v1/scan/url?url=${encodeURIComponent(target)}`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` },
                    });
                    const data = await resp2.json();
                    log(JSON.stringify(data, null, 2), data.result?.is_nsfw ? 'error' : 'success');
                } else {
                    log('Use the file upload button or drag & drop a file', 'warn');
                }
            } else if (cmd === 'health') {
                const resp = await fetch(`${baseUrl}/health`);
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'stats') {
                const resp = await fetch(`${baseUrl}/api/v1/stats`, { headers: { Authorization: `Bearer ${token}` } });
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'providers') {
                const resp = await fetch(`${baseUrl}/api/v1/stats/providers`, { headers: { Authorization: `Bearer ${token}` } });
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'token') {
                log(`Sandbox token: ${token}`, 'output');
            } else if (cmd === 'help') {
                log([
                    'Commands:',
                    '  health              — check service health',
                    '  stats               — view scan statistics',
                    '  providers           — list provider metrics',
                    '  token               — show sandbox token',
                    '  scan url <url>      — scan a URL',
                    '  clear               — clear terminal',
                    '  help                — show this help',
                    '',
                    'Or upload a file with the 📎 button to scan it.',
                ].join('\n'), 'output');
            } else if (cmd === 'clear') {
                setTermLog([]);
            } else {
                log(`Unknown command: ${cmd}. Type "help" for commands.`, 'warn');
            }
        } catch (e) {
            log(`Error: ${e.message}`, 'error');
        }
        setLoading(false);
    };

    const handleFileUpload = async (file) => {
        setTermOpen(true);
        log(`$ scan file "${file.name}" (${(file.size/1024).toFixed(1)}KB)`, 'cmd');

            const resp = await fetch(`${baseUrl}/api/v1/sandbox/scan`, {

            });
            if (resp.status === 401) {

                if (r?.labels?.length > 0) log(`Labels: ${r.labels.join(', ')}`, 'warn');
                r?.provider_results?.forEach(pr => {
                    log(`  ${pr.provider}: ${pr.is_nsfw ? 'NSFW' : 'Safe'} (${(pr.confidence*100).toFixed(0)}%) ${pr.latency_ms}ms`, pr.is_nsfw ? 'error' : 'output');

function TelegramVerify({ api, i18n }) {
    const he = i18n.lang === 'he';
    const [tgStatus, setTgStatus] = useState(null);
    const [botToken, setBotToken] = useState('');
    const [verifyData, setVerifyData] = useState(null);
    const [checking, setChecking] = useState(false);
    const [msg, setMsg] = useState('');
    const [fieldErr, setFieldErr] = useState(false);

    useEffect(() => { api.fetchApi('/api/v1/admin/telegram/status').then(setTgStatus).catch(() => {}); }, []);

    const startVerify = async () => {
        if (!botToken.trim()) { setFieldErr(true); return; }
        setFieldErr(false);
        setMsg(he ? '⏳ בודק טוקן...' : '⏳ Validating token...');
        const res = await api.postApi('/api/v1/admin/telegram/start-verify', { bot_token: botToken });
        if (res.status === 'ok') {
            setVerifyData(res);
            setMsg('');
        } else {
            setMsg(`❌ ${res.message}`);
        }
    };

    const checkVerify = async () => {
        if (!verifyData) return;
        setChecking(true);
        const res = await api.postApi('/api/v1/admin/telegram/check-verify', { code: verifyData.code });
        if (res.status === 'verified') {
            setMsg(`✅ ${he ? 'אומת!' : 'Verified!'} @${res.admin_user}`);
            setVerifyData(null);
            api.fetchApi('/api/v1/admin/telegram/status').then(setTgStatus);
        } else if (res.status === 'waiting') {
            setMsg(he ? '⏳ הקוד עדיין לא התקבל. שלחו אותו לבוט.' : '⏳ Code not received yet. Send it to the bot.');
        } else {
            setMsg(`❌ ${res.message}`);
        }
        setChecking(false);
    };

    return (
        <div className="card p-4">
            <div className="flex justify-between items-center mb-2">
                <h3 className="font-medium">🤖 {he ? 'אימות טלגרם' : 'Telegram Verification'}</h3>
                {tgStatus?.verified && <span className="px-2 py-0.5 rounded text-xs text-white badge-safe">{he ? 'מאומת' : 'Verified'}</span>}
            </div>
            <p className="text-muted/70 text-xs mb-3">{he
                ? 'חברו בוט טלגרם לקבלת התראות — כל התחברות לדשבורד תשלח הודעה.'
                : 'Connect a Telegram bot for alerts — every dashboard login triggers a notification.'}</p>

            {tgStatus?.verified ? (
                <div className="text-sm text-muted">
                    <div className="detail-row"><span className="detail-label">Bot</span><span className="detail-value">@{tgStatus.bot_username}</span></div>
                    <div className="detail-row"><span className="detail-label">Admin</span><span className="detail-value">@{tgStatus.admin_user}</span></div>
                </div>
            ) : !verifyData ? (
                <div className="space-y-2">
                    <p className="text-muted text-xs">{he
                        ? <>1. צרו בוט ב-<a href="https://t.me/BotFather" target="_blank" className="text-gold-dark">@BotFather</a> 2. הדביקו את הטוקן</>
                        : <>1. Create a bot via <a href="https://t.me/BotFather" target="_blank" className="text-gold-dark">@BotFather</a> 2. Paste the token</>}</p>
                    <div>
                        <input className={`input ${fieldErr ? 'border-red-500' : ''}`} placeholder="123456:ABCdef..." value={botToken}
                            onChange={e => { setBotToken(e.target.value); setFieldErr(false); }} dir="ltr" />
                        {fieldErr && <p className="text-red-600 text-xs mt-0.5">{he ? 'שדה חובה' : 'Required'}</p>}
                    </div>
                    <button className="btn btn-green" onClick={startVerify}>{he ? 'אמת' : 'Verify'}</button>
                </div>
            ) : (
                <div className="space-y-2">
                    <div className="bg-warm rounded p-3 text-center">
                        <p className="text-muted text-sm mb-2">{he ? 'שלחו את הקוד הזה לבוט:' : 'Send this code to the bot:'}</p>
                        <p className="text-3xl font-bold text-gold-dark font-mono select-all">{verifyData.code}</p>
                        <a href={`https://t.me/${verifyData.bot_username}`} target="_blank" className="text-gold-dark text-sm mt-2 inline-block">
                            → @{verifyData.bot_username}
                        </a>
                    </div>
                    <button className={`btn btn-blue w-full ${checking ? 'opacity-50' : ''}`} disabled={checking} onClick={checkVerify}>
                        {checking ? '⏳' : '🔍'} {he ? 'בדוק אם הקוד התקבל' : 'Check if code received'}
                    </button>
                </div>
            )}

            {msg && <div className="text-sm mt-2">{msg}</div>}
        </div>
    );
}

function PathSetup({ api, i18n, baseDomain, pathPrefix, port, onDone }) {
    const he = i18n.lang === 'he';
    const [phase, setPhase] = useState('idle'); // idle, detecting, found, custom, applying, done
    const [detectedFile, setDetectedFile] = useState('');
    const [customFile, setCustomFile] = useState('');
    const [msg, setMsg] = useState('');

    const detect = async () => {
        setPhase('detecting');
        setMsg(he ? '⏳ מחפש קובץ nginx...' : '⏳ Searching nginx config...');
        const res = await api.postApi('/api/v1/admin/domain/detect-nginx', { domain: baseDomain });
        if (res.status === 'found') {
            setDetectedFile(res.config_file);
            setPhase('found');
            setMsg('');
        } else {
            setPhase('custom');
            setMsg(he ? '⚠️ קובץ לא נמצא. הזינו את הנתיב ידנית:' : '⚠️ Config not found. Enter path manually:');
        }
    };

    const apply = async (configFile) => {
        setPhase('applying');
        setMsg(he ? '⏳ מוסיף הגדרה...' : '⏳ Applying config...');
        const res = await api.postApi('/api/v1/admin/domain/setup-path', { domain: baseDomain, path: pathPrefix, config_file: configFile });
        if (res.status === 'ok') {
            setPhase('done');
            setMsg(`✅ ${he ? 'הוגדר בהצלחה!' : 'Configured!'} ${res.url}`);
            onDone(`${baseDomain}/${pathPrefix}`);
        } else if (res.status === 'exists') {
            setPhase('done');
            setMsg(`✅ ${he ? 'כבר מוגדר!' : 'Already configured!'}`);
            onDone(`${baseDomain}/${pathPrefix}`);
        } else if (res.status === 'permission_denied' || res.status === 'manual_required') {
            setMsg(`⚠️ ${he ? 'צריך הרשאות. הריצו:' : 'Needs sudo. Run:'}\n${res.command || ''}`);
            setPhase('idle');
        } else {
            setMsg(`❌ ${res.message || 'Failed'}`);
            setPhase('idle');
        }
    };

    useEffect(() => { if (baseDomain && pathPrefix) detect(); }, [baseDomain, pathPrefix]);

    return (
        <div className="fade-in space-y-3">
            {phase === 'detecting' && <div className="text-sm text-muted">{msg}</div>}

            {phase === 'found' && (
                <div className="bg-warm rounded-lg p-4">
                    <p className="text-sm font-medium mb-2">{he ? '📁 נמצא קובץ תצורה:' : '📁 Found config file:'}</p>
                    <div className="bg-ink rounded p-2 font-mono text-xs text-gray-300 mb-3" dir="ltr">{detectedFile}</div>
                    <p className="text-muted text-xs mb-3">{he ? 'זה הקובץ הנכון?' : 'Is this the correct file?'}</p>
                    <div className="flex gap-2">
                        <button className="btn btn-green flex-1" onClick={() => apply(detectedFile)}>
                            ✅ {he ? 'כן, הוסף הגדרה' : 'Yes, apply'}
                        </button>
                        <button className="btn btn-gray flex-1" onClick={() => { setPhase('custom'); setMsg(''); }}>
                            ❌ {he ? 'לא, אבחר קובץ אחר' : 'No, choose different'}
                        </button>
                    </div>
                </div>
            )}

            {phase === 'custom' && (
                <div className="bg-warm rounded-lg p-4">
                    {msg && <p className="text-sm text-amber-600 mb-2">{msg}</p>}
                    <p className="text-sm mb-2">{he ? 'הזינו את הנתיב לקובץ nginx:' : 'Enter the nginx config file path:'}</p>
                    <input className="input mb-2" dir="ltr" placeholder="/etc/nginx/sites-enabled/example.com"
                        value={customFile} onChange={e => setCustomFile(e.target.value)} />
                    <button className="btn btn-green w-full" disabled={!customFile.trim()} onClick={() => apply(customFile.trim())}>
                        ⚡ {he ? 'הוסף הגדרה לקובץ' : 'Apply to this file'}
                    </button>
                </div>
            )}

            {phase === 'applying' && <div className="text-sm text-muted">{msg}</div>}
            {phase === 'done' && <div className="text-sm text-green-600">{msg}</div>}
            {phase === 'idle' && msg && <div className="card p-3 text-sm whitespace-pre-line">{msg}</div>}

            <details className="text-xs text-muted">
                <summary className="cursor-pointer">{he ? 'הצג הגדרה ידנית' : 'Show manual config'}</summary>
                <div className="bg-ink rounded p-3 font-mono text-xs text-gray-300 mt-2 overflow-x-auto" dir="ltr">
                    <pre>{`location /${pathPrefix} {
    proxy_pass http://127.0.0.1:${port}/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
}`}</pre>
                </div>
            </details>
        </div>
    );
}

function DomainTab({ api, i18n }) {
    const [config, setConfig] = useState(null);
    const [mode, setMode] = useState('domain');
    const [domain, setDomain] = useState('');
    const [baseDomain, setBaseDomain] = useState('');
    const [pathPrefix, setPathPrefix] = useState('');
    const [cfToken, setCfToken] = useState('');
    const [dns, setDns] = useState(null);
    const [status, setStatus] = useState('');
    const [step, setStep] = useState(1);

    const he = i18n.lang === 'he';

    useEffect(() => {
        api.fetchApi('/api/v1/admin/domain').then(d => {
            setConfig(d);
            if (d.domain) { setDomain(d.domain); setStep(3); }
        }).catch(() => {});
    }, []);

    const detectDns = async () => {
        if (!domain.trim()) return;
        // If user entered a path like example.com/path, switch to path mode
        if (domain.includes('/')) {
            const parts = domain.split('/');
            setBaseDomain(parts[0]);
            setPathPrefix(parts.slice(1).join('/'));
            setMode('path');
            setDomain('');
            return;
        }
        setStatus(he ? '🔍 סורק DNS...' : '🔍 Detecting DNS...');
        const res = await api.postApi('/api/v1/admin/domain/detect-dns', { domain });
        setDns(res);
        setStep(2);
        setStatus('');
    };

    const setupAuto = async () => {
        if (!cfToken.trim()) { setStatus('⚠️ Cloudflare token required'); setTimeout(() => setStatus(''), 3000); return; }
        setStatus(he ? '🔄 מגדיר DNS...' : '🔄 Setting up DNS...');
        const res = await api.postApi('/api/v1/admin/domain/setup-dns', { domain, cloudflare_token: cfToken });
        if (res.status === 'ok') {
            setStatus(`✅ DNS ${res.action}! ${domain} → ${res.ip}`);
            setupNginx();
        } else {
            setStatus(`❌ ${res.message}`);
        }
    };

    const setupNginx = async () => {
        setStatus(s => s + (he ? '\n🔄 מגדיר nginx + SSL...' : '\n🔄 Setting up nginx + SSL...'));
        const res = await api.postApi('/api/v1/admin/domain/setup-nginx', { domain });
        if (res.status === 'ok') {
            setStatus(`✅ ${he ? 'הכל מוגדר!' : 'All configured!'} https://${domain}/dashboard`);
            setStep(3);
        } else if (res.status === 'manual_required' || res.manual) {
            setStatus(`⚠️ ${he ? 'נדרשת הרצה ידנית:' : 'Manual setup required:'}\n${res.command || res.manual}`);
            setStep(3);
        } else {
            setStatus(`❌ ${res.message}`);
        }
    };

    const disconnect = async () => {
        await api.postApi('/api/v1/admin/domain/setup-dns', { domain: '', cloudflare_token: '' });
        setDomain(''); setDns(null); setStep(1); setCfToken(''); setConfig(null);
        setStatus(he ? '🔌 דומיין נותק' : '🔌 Domain disconnected');
        setTimeout(() => setStatus(''), 3000);
    };

    if (!config) return <div className="text-muted py-8 text-center">{i18n.t('loading')}</div>;

    const providerNames = {
        cloudflare: 'Cloudflare', route53: 'Amazon Route53', google: 'Google Domains',
        godaddy: 'GoDaddy', namecheap: 'Namecheap', unknown: he ? 'לא זוהה' : 'Unknown',
    };

    return (
        <div className="space-y-6">
            {/* Header */}
            <div className="card p-6 text-center" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <div className="text-3xl mb-2">🌐</div>
                <h3 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{he ? 'חיבור דומיין' : 'Connect Domain'}</h3>
                <p className="text-muted text-sm mt-1">{he ? 'חברו את SafeEye לדומיין שלכם לגישה מכל מקום' : 'Connect SafeEye to your domain for access from anywhere'}</p>
            </div>
            {/* Server info */}
            <div className="card p-5">
                <div className="detail-row"><span className="detail-label">Server IP</span><span className="detail-value font-mono">{config.server_ip}</span></div>
                <div className="detail-row"><span className="detail-label">Port</span><span className="detail-value">{config.port}</span></div>
                {config.domain && <div className="detail-row"><span className="detail-label">{he ? 'דומיין פעיל' : 'Active domain'}</span><span className="detail-value text-green-600">{config.domain}</span></div>}
            </div>

            {step === 3 && config.domain ? (
                /* Connected state */
                <div className="card p-4">
                    <div className="flex justify-between items-center mb-3">
                        <span className="font-medium">🌐 {config.domain}</span>
                        <span className="px-2 py-0.5 rounded text-xs text-white badge-safe">{he ? 'מחובר' : 'Connected'}</span>
                    </div>
                    <div className="space-y-1 text-sm text-muted mb-3" dir="ltr">
                        <div>Dashboard: <a href={`https://${config.domain}/dashboard`} target="_blank" className="text-gold-dark">https://{config.domain}/dashboard</a></div>
                        <div>API: <span className="text-ink">https://{config.domain}/api/v1/</span></div>

                    </div>

                    {mode === 'path' ? (
                        /* Path mode: liviatchen.com/scanner */
                        <div className="space-y-3">
                            <p className="text-muted text-xs">{he
                                ? 'הוסיפו את SafeEye כנתיב בדומיין שכבר מוגדר אצלכם בנגינקס (למשל: example.com/scanner).'

                                value={baseDomain} onChange={e => setBaseDomain(e.target.value)} dir="ltr" />
                            <div className="flex items-center gap-1" dir="ltr">
                                <span className="text-muted/70 text-sm">{baseDomain || 'example.com'} /</span>
                                <input className="input flex-1" placeholder={he ? 'נתיב (scanner)' : 'path (scanner)'}
                                    value={pathPrefix} onChange={e => setPathPrefix(e.target.value.replace(/^\//, ''))} dir="ltr" />
                            </div>
                            {baseDomain && pathPrefix && (
                                <PathSetup api={api} i18n={i18n} baseDomain={baseDomain} pathPrefix={pathPrefix} port={config.port}
                                    onDone={(full) => { setStep(3); setDomain(full); api.fetchApi('/api/v1/admin/domain').then(setConfig); }} />
                            )}
                        </div>
                    ) : (
                        /* Domain mode */
                        <div>
                            {/* Step 1: Enter domain */}
                            <p className="text-muted text-xs mb-2">{he
                                ? 'הכניסו דומיין או סאב-דומיין (למשל: scanner.example.com).'
                                : 'Enter a domain or subdomain (e.g. scanner.example.com).'}</p>
                            <div className="flex gap-2 mb-3">
                                <input className="input flex-1" placeholder="scanner.example.com"
                                    value={domain} onChange={e => setDomain(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && detectDns()} dir="ltr" />
                                <button className="btn btn-blue" onClick={detectDns}>{he ? 'סרוק' : 'Detect'}</button>
                            </div>

                            {/* Step 2: DNS detected */}
                            {dns && step >= 2 && (
                                <div className="fade-in space-y-3">
                                    <div className="bg-warm rounded p-3 text-sm">
                                        <div className="detail-row"><span className="detail-label">DNS Provider</span><span className="detail-value">{providerNames[dns.provider] || dns.provider}</span></div>
                                        <div className="detail-row"><span className="detail-label">NS Records</span><span className="detail-value text-xs font-mono">{(dns.ns_records||[]).join(', ') || '-'}</span></div>
                                    </div>

                                    {dns.auto_dns_supported ? (
                                        <div>
                                            <p className="text-green-600 text-sm mb-2">✅ {he ? 'Cloudflare זוהה! ניתן להגדיר אוטומטית.' : 'Cloudflare detected! Auto-setup available.'}</p>
                                            <input className="input mb-2" type="password" dir="ltr"
                                                placeholder="Cloudflare API Token (Edit zone DNS)"
                                                value={cfToken} onChange={e => setCfToken(e.target.value)} />
                                            <a href="https://dash.cloudflare.com/profile/api-tokens" target="_blank" rel="noopener"
                                                className="text-gold-dark hover:text-gold text-xs mb-2 inline-block">
                                                {he ? '→ צור API Token ב-Cloudflare' : '→ Create API Token in Cloudflare'}
                                            </a>
                                            <button className="btn btn-green w-full" onClick={setupAuto}>
                                                ⚡ {he ? 'הגדר אוטומטית (DNS + Nginx + SSL)' : 'Auto Setup (DNS + Nginx + SSL)'}
                                            </button>
                                        </div>
                                    ) : (
                                        <div>
                                            <p className="text-amber-600 text-sm mb-2">📋 {he ? 'הגדרה ידנית — הוסיפו רשומת A:' : 'Manual setup — add an A record:'}</p>
                                            <div className="bg-ink rounded p-3 font-mono text-sm text-gray-300 mb-2" dir="ltr">
                                                <div>Type: <b>A</b></div>
                                                <div>Name: <b>{domain}</b></div>
                                                <div>Value: <b>{config.server_ip}</b></div>
                                                <div>TTL: <b>Auto</b></div>
                                            </div>
                                            <p className="text-muted/70 text-xs mb-2">{he ? 'אחרי שהוספתם את הרשומה, בחרו:' : 'After adding the record, choose:'}</p>
                                            <div className="flex gap-2">
                                                <button className="btn btn-green flex-1" onClick={setupNginx}>
                                                    🔧 {he ? 'Nginx + SSL' : 'Nginx + SSL'}
                                                </button>
                                                <button className="btn btn-blue flex-1" onClick={async () => {
                                                    const res = await api.postApi('/api/v1/admin/domain/setup-direct', { domain });
                                                    if (res.status === 'ok') {
                                                        setStatus(`✅ ${he ? 'נשמר!' : 'Saved!'}\n${res.access_url}`);
                                                        setStep(3);
                                                        api.fetchApi('/api/v1/admin/domain').then(setConfig);
                                                    } else setStatus(`❌ ${res.message}`);
                                                }}>
                                                    🌐 {he ? 'ישיר (בלי Nginx)' : 'Direct (no Nginx)'}
                                                </button>
                                            </div>
                                            <p className="text-line text-xs mt-2">{he
                                                ? '💡 "ישיר" — DNS בלבד, גישה דרך http://domain:port. מתאים ל-VPS בלי nginx.'
                                                : '💡 "Direct" — DNS only, access via http://domain:port. For VPS without nginx.'}</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            )}

            {status && <div className="card p-3 text-sm whitespace-pre-line">{status}</div>}

            <TelegramVerify api={api} i18n={i18n} />

            {/* SSH Tunnel — auto-detect user+IP */}
            <SshTunnelCard api={api} i18n={i18n} />
        </div>
    );
}

/* ========== APP ========== */
function UpdateBanner({ api, i18n }) {
    const [update, setUpdate] = useState(null);
    const [dismissed, setDismissed] = useState(false);
    const he = i18n.lang === 'he';
    useEffect(() => {
        // Silent background check on load
        api.fetchApi('/api/v1/admin/check-update').then(data => {
            if (data.status === 'ok' && data.remote_sha) {
                const lastSeen = localStorage.getItem('safeeye_last_sha');
                if (lastSeen !== data.remote_sha) setUpdate(data);
            }
        }).catch(() => {});
    }, []);
    if (!update || dismissed) return null;
    return (
        <div style={{ background: '#FFF8E1', border: '1px solid #C9A962', borderRadius: '10px', padding: '12px 16px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', direction: 'ltr' }}>
            <div>
                <span style={{ fontWeight: 600, color: '#A68B4B' }}>🔄 {he ? 'גרסה חדשה זמינה!' : 'New version available!'}</span>
                <span style={{ color: '#7A7A7A', fontSize: '0.8rem', marginLeft: '8px' }}>{update.remote_sha} — {update.remote_message?.substring(0, 50)}</span>
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
                <button className="btn btn-blue text-xs" onClick={() => { setDismissed(true); localStorage.setItem('safeeye_last_sha', update.remote_sha); window.location.hash = 'about'; }}>
                    {he ? 'עדכון' : 'Update'}
                </button>
                <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#7A7A7A' }} onClick={() => { setDismissed(true); localStorage.setItem('safeeye_last_sha', update.remote_sha); }}>✕</button>
            </div>
        </div>
    );
}

function App() {
    const api = useApi();
    const i18n = useI18n();
    const [tab, setTabState] = useState(window.location.hash.replace('#','') || 'overview');
    const setTab = (t) => { setTabState(t); window.location.hash = t; };
    const [authed, setAuthed] = useState(!!api.token);

    useEffect(() => { setAuthed(!!api.token); }, [api.token]);
    useEffect(() => { document.documentElement.lang = i18n.lang; }, [i18n.lang]);

    if (!authed) return <LoginScreen onLogin={(t) => { api.saveToken(t); setAuthed(true); }} i18n={i18n} />;

    const tabs = [
        { id: 'overview', label: i18n.lang === 'he' ? 'דשבורד' : 'Dashboard', icon: '📊' },
        { id: 'history', label: i18n.t('history'), icon: '📋' },
        { id: 'providers', label: i18n.t('providers'), icon: '⚙️' },
        { id: 'tokens', label: i18n.t('tokens'), icon: '🔑' },
        { id: 'integrations', label: i18n.t('integrations'), icon: '🔗' },
        { id: 'docs', label: 'API', icon: '📚' },
        { id: 'domain', label: i18n.lang === 'he' ? 'דומיין' : 'Domain', icon: '🌐' },
        { id: 'report', label: i18n.t('report'), icon: '📝' },
        { id: 'about', label: i18n.t('about'), icon: '💡' },
    ];

    return (
        <div className="max-w-5xl mx-auto px-2 sm:px-4 py-4 sm:py-6" dir="ltr">
            <div className="flex justify-between items-center mb-4 sm:mb-6 px-1">
                <div className="flex items-center gap-2">
                    <span className="text-xl sm:text-2xl">🛡️</span>
                    <h1 className="text-lg sm:text-xl font-bold">{i18n.t('title')}</h1>
                    <span className="text-xs text-line hidden sm:inline">v{VERSION}</span>
                </div>
                <div className="flex items-center gap-2 sm:gap-3">
                    <ThemeToggle />
                    <LangSwitch i18n={i18n} />
                    <button className="text-muted hover:text-ink text-xs sm:text-sm" onClick={() => { api.clearToken(); setAuthed(false); }}>{i18n.t('logout')}</button>
                </div>
            </div>
            <div style={{ display: 'flex', flexDirection: i18n.isRtl ? 'row-reverse' : 'row', gap: '0px', borderBottom: '1px solid #E5E2DD', marginBottom: '16px', padding: '0 4px', overflowX: 'auto' }}>
                {tabs.map(t => (
                    <button key={t.id} style={{ flex: 1, textAlign: 'center', paddingBottom: '8px', fontSize: '0.8rem', fontWeight: 500, cursor: 'pointer', border: 'none', background: 'none', borderBottom: tab === t.id ? '2px solid #C9A962' : '2px solid transparent', color: tab === t.id ? '#A68B4B' : '#7A7A7A' }}
                        onClick={() => setTab(t.id)}>
                        <div style={{ fontSize: '1rem' }}>{t.icon}</div>
                        <div>{t.label}</div>
                    </button>
                ))}
            </div>
            <UpdateBanner api={api} i18n={i18n} />
            <div className="content-bidi" data-dir={i18n.isRtl ? 'rtl' : 'ltr'}>
            {tab === 'overview' && <OverviewTab api={api} i18n={i18n} />}
            {tab === 'providers' && <ProvidersTab api={api} i18n={i18n} />}
            {tab === 'history' && <HistoryTab api={api} i18n={i18n} />}
            {tab === 'tokens' && <TokensTab api={api} i18n={i18n} />}
            {tab === 'integrations' && <IntegrationsTab api={api} i18n={i18n} />}
            {tab === 'docs' && <ApiDocsTab api={api} i18n={i18n} onNavigate={setTab} />}
            {tab === 'domain' && <DomainTab api={api} i18n={i18n} />}
            {tab === 'report' && <ReportTab api={api} i18n={i18n} />}
            {tab === 'about' && <AboutTab api={api} i18n={i18n} />}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
