// ========== Client-side pHash (dHash) ==========
const ClientHash = {
    compute(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 9; canvas.height = 8;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 9, 8);
                const data = ctx.getImageData(0, 0, 9, 8).data;
                const pixels = [];
                for (let i = 0; i < data.length; i += 4) {
                    pixels.push(Math.round(data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114));
                }
                const avg = pixels.reduce((a, b) => a + b, 0) / pixels.length;
                const bits = pixels.map(p => p > avg ? '1' : '0').join('');
                const hex = BigInt('0b' + bits).toString(16).padStart(Math.ceil(bits.length / 4), '0');
                resolve(hex);
                URL.revokeObjectURL(img.src);
            };
            img.onerror = () => resolve(null);
            img.src = URL.createObjectURL(file);
        });
    },
    _hamming(a, b) {
        if (!a || !b || a.length !== b.length) return 999;
        const x = BigInt('0x' + a) ^ BigInt('0x' + b);
        let d = 0; let v = x;
        while (v) { d++; v &= v - 1n; }
        return d;
    },
    _cache: null,
    _cacheTime: 0,
    async getMetadata() {
        const now = Date.now();
        if (this._cache && now - this._cacheTime < 3600000) return this._cache;
        try {
            const res = await fetch(`${METADATA_API}/api/v1/metadata/hashes`);
            if (!res.ok) return null;
            this._cache = await res.json();
            this._cacheTime = now;
            return this._cache;
        } catch { return null; }
    },
    async preScan(file) {
        if (!localStorage.getItem('safeeye_prescan')) return null;
        const hash = await this.compute(file);
        if (!hash) return null;
        const meta = await this.getMetadata();
        if (!meta) return null;
        for (const rec of meta) {
            if (this._hamming(hash, rec.p) <= 3) {
                return { match: true, phash: hash, is_nsfw: !!rec.n, confidence: rec.c, labels: rec.l, source: 'local_metadata' };
            }
        }
        return { match: false, phash: hash };
    }
};

function useI18n() {
    const [lang, setLang] = useState(localStorage.getItem('scanner_lang') || 'he');
    const t = (key) => LANGS[lang]?.[key] || LANGS.en[key] || key;
    const switchLang = (l) => { setLang(l); localStorage.setItem('scanner_lang', l); };
    const isRtl = lang === 'he';
    return { t, lang, switchLang, isRtl };
}

function useApi() {
    const [token, setToken] = useState(localStorage.getItem('scanner_token') || '');
    const headers = { Authorization: `Bearer ${token}` };
    const saveToken = (t) => { setToken(t); localStorage.setItem('scanner_token', t); };
    const clearToken = () => { setToken(''); localStorage.removeItem('scanner_token'); };
    const fetchApi = async (path) => {
        const res = await fetch(`${API}${path}`, { headers });
        if (res.status === 401) { clearToken(); throw new Error('Unauthorized'); }
        return res.json();
    };
    const postApi = async (path, body) => {
        const res = await fetch(`${API}${path}`, {
            method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        return res.json();
    };
    return { token, saveToken, clearToken, fetchApi, postApi, headers };
}

function ThemeToggle() {
    const [dark, setDark] = useState(localStorage.getItem('scanner_theme') === 'dark');
    const toggle = () => {
        const next = !dark;
        setDark(next);
        document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
        localStorage.setItem('scanner_theme', next ? 'dark' : 'light');
    };
    return <button onClick={toggle} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.1rem', padding: '2px 6px' }}>{dark ? '☀️' : '🌙'}</button>;
}

            <button className={`px-2 py-0.5 rounded ${i18n.lang === 'en' ? 'bg-gold' : 'bg-warm'}`}
                onClick={() => i18n.switchLang('en')}>EN</button>
        </div>
    );
}

function PreScanToggle({ i18n }) {
    const [on, setOn] = useState(!!localStorage.getItem('safeeye_prescan'));
    const toggle = () => {
        const next = !on;
        if (next) localStorage.setItem('safeeye_prescan', '1');
        else localStorage.removeItem('safeeye_prescan');
        setOn(next);
        ClientHash._cache = null;
    };
    const he = i18n.lang === 'he';
    return (
        <button onClick={toggle} title={he ? 'סריקה מקדימה בצד לקוח' : 'Client-side pre-scan'}
            className="text-xs px-2 py-0.5 rounded"
            style={{ background: on ? '#C9A962' : '#F0EDE8', color: on ? '#fff' : '#7A7A7A' }}>
            ⚡
        </button>
    );
}

function LoginScreen({ onLogin, i18n }) {
    const [step, setStep] = useState('loading'); // loading, local, telegram, telegram_code, token
    const [username, setUsername] = useState('');
    const [code, setCode] = useState('');
    const [input, setInput] = useState('');
    const [error, setError] = useState('');
    const [botUser, setBotUser] = useState('');
    const he = i18n.lang === 'he';

    useEffect(() => {
        // Demo site — skip login
        const host = window.location.hostname;
        if (host.includes('lhflow.com') || host.includes('primary.')) {
            onLogin('_demo_');
            return;
        }
        fetch(`${API}/api/v1/auth/mode`).then(r => r.json()).then(data => {
            if (data.mode === 'local') {
                onLogin(data.token);
            } else if (data.mode === 'telegram') {
                setBotUser(data.bot_username);
                setStep('telegram');
            } else {
                setStep('token');
            }
        }).catch(() => setStep('token'));
    }, []);

    const requestCode = async () => {
        if (!username.trim()) return;
        setError('');
        try {
            const res = await fetch(`${API}/api/v1/auth/telegram/request`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.trim() }),
            });
            const data = await res.json();
            if (!res.ok) { setError(data.detail || 'Error'); return; }
            setStep('telegram_code');
        } catch (e) { setError(e.message); }
    };

    const verifyCode = async () => {
        if (!code.trim()) return;
        setError('');
        try {
            const res = await fetch(`${API}/api/v1/auth/telegram/verify`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.trim(), code: code.trim() }),
            });
            const data = await res.json();
            if (!res.ok) { setError(data.detail || 'Error'); return; }
            onLogin(data.token);
        } catch (e) { setError(e.message); }
    };

    if (step === 'loading') return (
        <div className="min-h-screen flex items-center justify-center">
            <div className="text-5xl">🛡️</div>
        </div>
    );

    return (
        <div className="min-h-screen flex items-center justify-center" dir="ltr">
            <div className="card p-8 w-[420px] text-center" style={{ direction: 'ltr' }}>
                <div className="text-5xl mb-3">🛡️</div>

                        onChange={e => setInput(e.target.value)}

function SkeletonLoader({ type = 'card', count = 1 }) {
    const items = Array.from({ length: count });
    if (type === 'stats') return (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-stat rounded-xl"></div>)}
        </div>
    );
    if (type === 'cards') return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-card rounded-xl"></div>)}
        </div>
    );
    return (
        <div className="space-y-3">
            {items.map((_, i) => <div key={i} className="skeleton skeleton-card rounded-xl"></div>)}
        </div>
    );
}

function ScanProgress({ status }) {
    const steps = [
        { key: 'download', label: '📥', pct: 20 },
        { key: 'providers', label: '🔍', pct: 60 },
        { key: 'voting', label: '🗳️', pct: 90 },
        { key: 'done', label: '✅', pct: 100 },
    ];
    const current = status === 'pending' ? 0 : status === 'processing' ? 1 : status === 'completed' ? 3 : 0;
    const pct = steps[current]?.pct || 0;
    return (
        <div>
            <div className="progress-bar" style={{ marginBottom: '8px' }}>
                <div className="progress-fill" style={{ width: `${pct}%` }}></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: '#7A7A7A' }}>
                {steps.map((s, i) => (
                    <span key={s.key} style={{ opacity: i <= current ? 1 : 0.3 }}>{s.label}</span>
                ))}
            </div>
        </div>
    );
}

function CopyBlock({ text, children }) {
    const [copied, setCopied] = useState(false);
    const copy = (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(text || '');
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
    };
    return (
        <div className="relative group">
            <div className="bg-ink rounded-lg p-3 font-mono text-xs text-gray-300" dir="ltr" style={{ paddingRight: '48px' }}>
                {children || text}
            </div>
            <button onClick={copy} className="absolute top-2 right-2 px-2 py-1 rounded text-xs transition-all"
                style={{ background: copied ? '#2D8A56' : '#333', color: copied ? 'white' : '#999', border: 'none', cursor: 'pointer' }}>
                {copied ? '✓' : '📋'}
            </button>
        </div>
    );
}

function D3Analytics({ api, i18n, data }) {
    const he = i18n.lang === 'he';
    const [timeline, setTimeline] = useState([]);
    const [providerData, setProviderData] = useState([]);
    const donutRef = useRef(null);
    const heatmapRef = useRef(null);
    const barRef = useRef(null);

    useEffect(() => {
        api.fetchApi('/api/v1/stats/timeline?days=30').then(setTimeline).catch(() => {});
        api.fetchApi('/api/v1/stats/providers').then(setProviderData).catch(() => {});
    }, []);

    // Donut — NSFW vs Clean ratio
    useEffect(() => {
        if (!donutRef.current || !data) return;
        const el = donutRef.current;
        el.innerHTML = '';
        const w = 130, h = 130, r = 52;
        const nsfw = data.nsfw_detected || 0;
        const clean = (data.total_scans || 0) - nsfw;
        if (!data.total_scans) return;
        const pie = d3.pie().sort(null)([clean, nsfw]);
        const arc = d3.arc().innerRadius(r * 0.6).outerRadius(r);
        const svg = d3.select(el).append('svg').attr('viewBox', `0 0 ${w} ${h}`).append('g').attr('transform', `translate(${w/2},${h/2})`);
        svg.selectAll('path').data(pie).enter().append('path')
            .attr('d', arc).attr('fill', (d, i) => i === 0 ? '#2D8A56' : '#C0392B')
            .attr('opacity', 0).transition().duration(800).attr('opacity', 1)
            .attrTween('d', function(d) { const i = d3.interpolate({startAngle:0,endAngle:0}, d); return t => arc(i(t)); });
        svg.append('text').attr('text-anchor', 'middle').attr('dy', '-0.1em').style('font-size', '1rem').style('font-weight', '700').style('fill', 'currentColor').text(data.total_scans);
        svg.append('text').attr('text-anchor', 'middle').attr('dy', '1em').style('font-size', '0.5rem').style('fill', '#7A7A7A').text(he ? 'סריקות' : 'scans');
    }, [data]);

    // Heatmap — hourly activity
    useEffect(() => {
        if (!heatmapRef.current || !timeline.length) return;
        const el = heatmapRef.current;
        el.innerHTML = '';
        const margin = {top: 14, right: 4, bottom: 4, left: 24};
        const cellSize = 8, gap = 1;
        const days = [...new Set(timeline.map(d => d.day))].sort().slice(-7);
        const w = 24 * (cellSize + gap) + margin.left + margin.right;
        const h = days.length * (cellSize + gap) + margin.top + margin.bottom;
        const maxCount = Math.max(1, ...timeline.map(d => d.count));

        const color = d3.scaleSequential(d3.interpolateYlOrRd).domain([0, maxCount]);

        const svg = d3.select(el).append('svg').attr('viewBox', `0 0 ${w} ${h}`);
        const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

        // Hour labels
        [0,6,12,18,23].forEach(h => {
            g.append('text').attr('x', h * (cellSize + gap) + cellSize/2).attr('y', -6).attr('text-anchor', 'middle').style('font-size', '8px').style('fill', '#7A7A7A').text(h);
        });

        // Day labels
        days.forEach((day, i) => {
            g.append('text').attr('x', -4).attr('y', i * (cellSize + gap) + cellSize/2 + 3).attr('text-anchor', 'end').style('font-size', '7px').style('fill', '#7A7A7A').text(day.slice(5));
        });

        // Cells
        const lookup = {};
        timeline.forEach(d => { lookup[`${d.day}-${d.hour}`] = d.count; });

        days.forEach((day, di) => {
            for (let h = 0; h < 24; h++) {
                const count = lookup[`${day}-${h}`] || 0;
                g.append('rect')
                    .attr('x', h * (cellSize + gap)).attr('y', di * (cellSize + gap))
                    .attr('width', cellSize).attr('height', cellSize)
                    .attr('rx', 3).attr('fill', count > 0 ? color(count) : '#F5F3F0')
                    .attr('opacity', 0)
                    .append('title').text(`${day} ${h}:00 — ${count} scans`);
                g.select(`rect:last-child`).transition().delay((di * 24 + h) * 8).duration(300).attr('opacity', 1);
            }
        });
    }, [timeline]);

    // Provider performance bars
    useEffect(() => {
        if (!barRef.current || !providerData.length) return;
        const el = barRef.current;
        el.innerHTML = '';
        const active = providerData.filter(p => p.total_scans > 0);
        if (!active.length) return;
        const margin = {top: 4, right: 50, bottom: 4, left: 70};
        const barH = 18, gap = 4;
        const w = 300;
        const h = active.length * (barH + gap) + margin.top + margin.bottom;
        const maxLat = Math.max(...active.map(d => d.avg_latency_ms));

        const svg = d3.select(el).append('svg').attr('viewBox', `0 0 ${w} ${h}`);
        const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
        const x = d3.scaleLinear().domain([0, maxLat * 1.2]).range([0, w - margin.left - margin.right]);

        active.forEach((p, i) => {
            const y = i * (barH + gap);
            // Label
            g.append('text').attr('x', -4).attr('y', y + barH / 2 + 4).attr('text-anchor', 'end').style('font-size', '10px').style('fill', 'currentColor').text(p.provider);
            // Bar
            g.append('rect').attr('x', 0).attr('y', y).attr('width', 0).attr('height', barH).attr('rx', 6)
                .attr('fill', p.avg_latency_ms < 500 ? '#2D8A56' : p.avg_latency_ms < 2000 ? '#C9A962' : '#C0392B')
                .transition().duration(600).delay(i * 100).attr('width', x(p.avg_latency_ms));
            // Value
            g.append('text').attr('x', x(p.avg_latency_ms) + 6).attr('y', y + barH / 2 + 4).style('font-size', '10px').style('fill', '#7A7A7A')
                .text(`${p.avg_latency_ms}ms`).attr('opacity', 0).transition().delay(i * 100 + 400).attr('opacity', 1);
        });
    }, [providerData]);

    if (!data || !data.total_scans) return null;

    return (
        <div className="grid grid-cols-3 gap-3">
            {/* NSFW/Clean Donut */}
            <div className="card p-3">
                <h4 className="text-ink text-xs font-medium mb-1">{he ? 'יחס' : 'Ratio'}</h4>
                <div ref={donutRef} style={{ display: 'flex', justifyContent: 'center', maxHeight: '120px' }}></div>
                <div className="flex justify-center gap-3 mt-1 text-xs">
                    <span><span style={{ display:'inline-block',width:6,height:6,borderRadius:3,background:'#2D8A56',marginRight:3 }}></span>{he ? 'נקי' : 'Clean'}</span>
                    <span><span style={{ display:'inline-block',width:6,height:6,borderRadius:3,background:'#C0392B',marginRight:3 }}></span>NSFW</span>
                </div>
            </div>

            {/* Hourly Heatmap */}
            <div className="card p-3">
                <h4 className="text-ink text-xs font-medium mb-1">{he ? 'פעילות לפי שעה' : 'Hourly Activity'}</h4>
                <div ref={heatmapRef} style={{ overflowX: 'auto', maxHeight: '120px' }} dir="ltr"></div>
                {!timeline.length && <p className="text-muted text-xs text-center">{he ? 'אין נתונים' : 'No data'}</p>}
            </div>

            {/* Provider Latency Bars */}
            <div className="card p-3">
                <h4 className="text-ink text-xs font-medium mb-1">{he ? 'זמן תגובה' : 'Latency'}</h4>
                <div ref={barRef} style={{ maxHeight: '120px' }} dir="ltr"></div>
                {!providerData.some(p => p.total_scans > 0) && <p className="text-muted text-xs text-center">{he ? 'אין נתונים' : 'No data'}</p>}
            </div>
        </div>
    );
}

function TokensTab({ api, i18n }) {
    const [tokens, setTokens] = useState([]);
    const [name, setName] = useState('');
    const [created, setCreated] = useState(null);
    const [selectedToken, setSelectedToken] = useState(null);

    const load = () => { api.fetchApi('/api/v1/admin/tokens').then(setTokens).catch(() => {}); };
    useEffect(() => { load(); }, []);

    const create = async () => {
        if (!name) return;
        const res = await fetch(`${API}/api/v1/admin/tokens`, {
            method: 'POST', headers: { ...api.headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
        });
        if (res.ok) { const d = await res.json(); setCreated(d.token); setName(''); load(); }
    };
    const revoke = async (e, n) => {
        e.stopPropagation();
        if (!confirm(`${i18n.t('confirm_revoke')} "${n}"?`)) return;
        await fetch(`${API}/api/v1/admin/tokens/${n}`, { method: 'DELETE', headers: api.headers });
        load();
    };

    return (
        <div className="space-y-6">
            <div className="card p-6" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <h3 className="font-bold text-ink mb-4" style={{ fontFamily: 'Playfair Display, serif' }}>🔑 {i18n.t('create_token')}</h3>
                <div className="flex gap-3">
                    <input className="input flex-1" value={name} onChange={e => setName(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && create()} placeholder={i18n.t('token_name')} />
                    <button className="btn btn-blue" onClick={create}>{i18n.t('create')}</button>
                </div>
                {created && (
                    <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
                        <div className="text-green-700 text-sm font-medium mb-2">{i18n.t('token_created')}</div>
                        <CopyBlock text={created}><span className="text-green-800 break-all">{created}</span></CopyBlock>
                    </div>
                )}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {tokens.map(t => (
                    <div key={t.name} className="card p-6" style={{ cursor: 'pointer' }} onClick={() => setSelectedToken(t.name)}>
                        <div className="flex items-center gap-3 mb-4">
                            <span className="text-2xl">🔑</span>
                            <div>
                                <h4 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{t.name}</h4>
                                <span className="text-muted text-xs">{t.scan_count} {i18n.t('scans')} — {i18n.lang === 'he' ? 'לחצו לפרטים' : 'click for usage'}</span>
                            </div>
                        </div>
                        <div className="space-y-2 text-sm">
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('created_at')}</span><span className="text-ink" dir="ltr">{new Date(t.created_at).toLocaleDateString()}</span></div>
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('expires')}</span><span className="text-ink">{t.expires_at ? new Date(t.expires_at).toLocaleDateString() : i18n.t('never')}</span></div>
                            <div className="flex justify-between"><span className="text-muted">{i18n.t('last_used')}</span><span className="text-ink">{t.last_used ? new Date(t.last_used).toLocaleDateString() : i18n.t('never')}</span></div>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <button className="btn btn-blue text-xs flex-1" onClick={(e) => { e.stopPropagation(); setSelectedToken(t.name); }}>{i18n.lang === 'he' ? '📊 שימוש' : '📊 Usage'}</button>
                            <button className="btn btn-red text-xs" onClick={(e) => revoke(e, t.name)}>{i18n.t('revoke')}</button>
                        </div>
                    </div>
                ))}
            </div>
            {tokens.length === 0 && <div className="card p-10 text-center"><div className="text-4xl mb-3">🔑</div><p className="text-muted">{i18n.t('no_tokens')}</p></div>}
            {selectedToken && <TokenUsageModal api={api} i18n={i18n} tokenName={selectedToken} onClose={() => setSelectedToken(null)} />}
        </div>
    );
}

function ExtensionPairing({ api, i18n }) {
    const he = i18n.lang === 'he';
    const [code, setCode] = useState('');
    const [expires, setExpires] = useState(0);
    const [generating, setGenerating] = useState(false);

    const generate = async () => {
        setGenerating(true);
        try {
            const res = await api.postApi('/api/v1/extension/pair/create', {});
            if (res.code) {
                setCode(res.code);
                setExpires(Date.now() + (res.expires_in || 300) * 1000);
            }
        } catch {}
        setGenerating(false);
    };

    const isExpired = expires && Date.now() > expires;

    return (
        <div className="card p-6">
            <div className="flex items-start gap-4">
                <div className="text-3xl">🔌</div>
                <div className="flex-1">
                    <h4 className="font-bold text-ink mb-1" style={{ fontFamily: 'Playfair Display, serif' }}>
                        {he ? 'חיבור תוסף לדפדפן' : 'Connect Browser Extension'}
                    </h4>
                    <p className="text-muted text-xs mb-3">
                        {he ? 'צרו קוד חיבור והכניסו אותו בתוסף. תוקף 5 דקות.' : 'Generate a pairing code and enter it in the extension. Valid for 5 minutes.'}
                    </p>
                    {!code || isExpired ? (
                        <button className="btn btn-green" onClick={generate} disabled={generating}>
                            {generating ? '...' : (he ? '🔑 צור קוד חיבור' : '🔑 Generate Pairing Code')}
                        </button>
                    ) : (
                        <div>
                            <div className="bg-ink rounded-lg p-4 text-center mb-2" dir="ltr">
                                <span style={{ fontFamily: 'Fira Code, monospace', fontSize: '2rem', letterSpacing: '0.3em', color: '#C9A962' }}>{code}</span>

                    )}

            </div>
        </div>
    );
}

function IntegrationsTab({ api, i18n }) {
    const [providers, setProviders] = useState(null);
    const [forms, setForms] = useState({});
    const [msg, setMsg] = useState('');
    const [fieldErrors, setFieldErrors] = useState({});

    const reload = () => { api.fetchApi('/api/v1/admin/providers').then(setProviders).catch(() => {}); };
    useEffect(() => { reload(); }, []);

    const connect = async (def) => {
        const body = {};
        const errors = {};
        for (const f of def.fields) {
            const val = (forms[f.k] || '').trim();
            if (!val) { errors[f.k] = true; }
            else { body[f.k] = val; }
        }
        if (Object.keys(errors).length > 0) { setFieldErrors(errors); return; }
        setFieldErrors({});
        const res = await api.postApi('/api/v1/admin/providers', body);
        setMsg(res.status === 'ok' ? '✅' : '❌');
        setForms({});
        reload();
        setTimeout(() => setMsg(''), 3000);
    };

    const disconnect = async (key) => {
        await api.postApi('/api/v1/admin/providers/disconnect', { provider: key });
        setMsg('🔌');
        reload();
        setTimeout(() => setMsg(''), 2000);
    };

    const [installing, setInstalling] = useState('');
    const installProvider = async (key) => {
        setInstalling(key);
        setMsg(i18n.lang === 'he' ? `⏳ מתקין ${key}... (עד 5 דקות)` : `⏳ Installing ${key}... (up to 5 min)`);
        try {
            const res = await api.postApi('/api/v1/admin/providers/install', { provider: key });
            if (res.status === 'ok') {
                setMsg(i18n.lang === 'he' ? `✅ ${key} הותקן בהצלחה!` : `✅ ${key} installed successfully!`);
                reload();
            } else {
                setMsg(`❌ ${key}: ${res.output || 'Install failed'}`);
            }
        } catch (e) { setMsg(`❌ ${key}: ${e.message}`); }
        setInstalling('');
        setTimeout(() => setMsg(''), 8000);
    };

    if (!providers) return <div className="text-muted py-8 text-center">{i18n.t('loading')}</div>;

    const Badge = ({ ok }) => <span className={`px-2 py-0.5 rounded text-xs text-white ${ok ? 'badge-safe' : 'bg-slate-600'}`}>{ok ? i18n.t('connected') : i18n.t('not_connected')}</span>;
    const signupText = i18n.lang === 'he' ? '→ הרשמה והשגת מפתח' : '→ Sign up & get API key';

    const he = i18n.lang === 'he';
    return (
        <div className="space-y-6">
            <div className="card p-6 text-center" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                <div className="text-3xl mb-2">🔗</div>
                <h3 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{he ? 'חיבור ספקי סריקה' : 'Connect Scan Providers'}</h3>
                <p className="text-muted text-sm mt-1">{he ? 'חברו ספקים נוספים לסריקה מדויקת יותר' : 'Connect additional providers for better accuracy'}</p>
            </div>
            {msg && <div className="text-center text-lg">{msg}</div>}

            {/* Extension Pairing */}
            <ExtensionPairing api={api} i18n={i18n} />

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {PROVIDER_DEFS.map(def => {
                    const isConnected = providers[def.key]?.configured;
                    return (
                        <div key={def.key} className="card p-6">
                            <div className="flex items-center gap-3 mb-3">
                                <span className="text-2xl">{def.icon}</span>
                                <div className="flex-1">
                                    <h4 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{def.key}</h4>
                                </div>
                                <span className={`px-3 py-1 rounded-full text-xs font-medium ${isConnected ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-warm text-muted border border-line'}`}>
                                    {isConnected ? (he ? '✅ מחובר' : '✅ Connected') : (he ? 'לא מחובר' : 'Not connected')}
                                </span>
                            </div>
                            {def.local ? (
                                <div>
                                    <p className="text-muted text-sm">{he ? (def.desc_he || 'מודל מקומי') : (def.desc_en || 'Local model')}</p>
                                    {isConnected && <p className="text-green-600 text-xs mt-1">{def.install ? (he ? '✅ מותקן ופעיל' : '✅ Installed & active') : (he ? 'פועל מהקופסה' : 'Works out of the box')}</p>}
                                    {!isConnected && def.install && (
                                        <div className="mt-2 space-y-2">
                                            <button className="btn btn-green w-full" disabled={installing === def.key}
                                                onClick={() => installProvider(def.key)}>
                                                {installing === def.key ? (he ? '⏳ מתקין... (עד 5 דקות)' : '⏳ Installing... (up to 5 min)') : (he ? '📦 התקן' : '📦 Install')}
                                            </button>
                                            <div className="bg-ink rounded p-2 font-mono text-xs text-gray-300 select-all" dir="ltr">{def.install}</div>
                                        </div>
                                    )}
                                    {!isConnected && !def.install && <p className="text-amber-600 text-xs mt-1">{he ? '❌ לא זמין' : '❌ Not available'}</p>}
                                </div>
                            ) : isConnected ? (

                                    <p className="text-green-600 text-sm mb-3">{he ? 'מחובר ופעיל' : 'Connected and active'}</p>

                                        {def.fields.map(f => (
                                            <div key={f.k}>
                                                <input className={`input ${fieldErrors[f.k] ? 'border-red-500' : ''}`} type={f.pw ? 'password' : 'text'}
                                                    placeholder={f.ph} value={forms[f.k] || ''}
                                                    onChange={e => { setForms({...forms, [f.k]: e.target.value}); setFieldErrors({...fieldErrors, [f.k]: false}); }} dir="ltr" />
                                                {fieldErrors[f.k] && <p className="text-red-600 text-xs mt-0.5">{he ? 'שדה חובה' : 'Required'}</p>}
                                            </div>
                                        ))}
                                        <button className="btn btn-green" onClick={() => connect(def)}>{i18n.t('connect')}</button>
                                    </div>
                                </div>
                            )}

                    );
                })}

        </div>

function UpdateChecker({ api, i18n }) {
    const he = i18n.lang === 'he';
    const [status, setStatus] = useState(null);
    const [checking, setChecking] = useState(false);
    const [updating, setUpdating] = useState(false);
    const [updateStatus, setUpdateStatus] = useState(null);

    const check = async () => {
        setChecking(true);
        setUpdateStatus(null);
        try {
            const data = await api.fetchApi('/api/v1/admin/check-update');
            setStatus(data);
        } catch (e) {
            setStatus({ status: 'error', message: e.message });
        }
        setChecking(false);
    };

    return (
        <div className="card p-6">
            <div className="flex items-center gap-3 mb-3">
                <span className="text-2xl">🔄</span>
                <div>
                    <h4 className="font-bold text-ink" style={{ fontFamily: 'Playfair Display, serif' }}>{he ? 'עדכונים' : 'Updates'}</h4>
                    <span className="text-muted text-xs">v{VERSION}</span>
                </div>
            </div>
            <button className={`btn btn-blue text-sm mb-3 ${checking ? 'opacity-50' : ''}`} disabled={checking} onClick={check}>
                {checking ? '⏳' : '🔍'} {he ? 'בדוק עדכונים' : 'Check for Updates'}
            </button>

            {status && status.status === 'ok' && (
                <div className="fade-in space-y-2">
                    <div className="bg-warm rounded-lg p-4 text-sm">
                        <div className="flex justify-between mb-1">
                            <span className="text-muted">{he ? 'גרסה נוכחית' : 'Current'}</span>
                            <span className="text-ink font-medium" dir="ltr">v{status.local_version} ({status.local_sha || '?'})</span>
                        </div>
                        <div className="flex justify-between mb-1">
                            <span className="text-muted">{he ? 'אחרון ב-GitHub' : 'Latest on GitHub'}</span>
                            <span className="text-ink font-mono text-xs" dir="ltr">{status.remote_sha}</span>
                        </div>
                        {status.update_available ? (
                            <div className="mt-2 p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-800">
                                {he ? '🔔 קיים עדכון: ' : '🔔 Update available: '}{status.remote_message?.substring(0, 60)}
                            </div>
                        ) : (
                            <div className="mt-2 p-2 bg-green-50 border border-green-200 rounded text-xs text-green-700">
                                {he ? '✅ המערכת מעודכנת!' : '✅ You are up to date!'}
                            </div>
                        )}
                    </div>
                    {status.update_available && <button className={`btn btn-green w-full mt-2 ${updating ? 'opacity-50' : ''}`} disabled={updating} onClick={async () => {
                        setUpdating(true);
                        setUpdateStatus(he ? '⏳ מעדכן...' : '⏳ Updating...');
                        const res = await api.postApi('/api/v1/admin/deploy', {});
                        if (res.status === 'deploying') {
                            setUpdateStatus(he ? '🔄 העדכון החל. הדף יתרענן תוך 30 שניות...' : '🔄 Update started. Page will refresh in 30s...');
                            setTimeout(() => window.location.reload(), 30000);
                        } else {
                            setUpdateStatus(`❌ ${res.message || 'Failed'}`);
                        }
                        setUpdating(false);
                    }}>
                        ⚡ {he ? 'עדכן עכשיו' : 'Update Now'}
                    </button>}
                    {updateStatus && <div className="text-sm mt-2">{updateStatus}</div>}
                </div>
            )}
            {status && status.status === 'error' && (
                <div className="text-red-600 text-sm">{status.message}</div>
            )}
        </div>
    );
}

            <p className="text-center text-muted/40 text-xs pb-4">&copy; {new Date().getFullYear()} DVS Technology. {he ? 'כל הזכויות שמורות.' : 'All rights reserved.'}</p>
        </div>
    );
}

/* ========== API DOCS with Terminal ========== */
function ApiDocsTab({ api, i18n, onNavigate }) {
    const he = i18n.lang === 'he';
    const baseUrl = window.location.origin;
    const [termOpen, setTermOpen] = useState(false);
    const [termLog, setTermLog] = useState([]);
    const [termInput, setTermInput] = useState('');
    const [sandboxToken, setSandboxToken] = useState(localStorage.getItem('sandbox_token') || '');
    const [loading, setLoading] = useState(false);
    const termRef = useRef(null);

    // Auto-create sandbox token
    useEffect(() => {
        if (!sandboxToken) {
            api.postApi('/api/v1/sandbox/token', {}).then(res => {
                if (res.token) { setSandboxToken(res.token); localStorage.setItem('sandbox_token', res.token); }
            }).catch(() => {});
        }
    }, []);

    const log = (text, type = 'output') => {
        setTermLog(prev => [...prev, { text, type, time: new Date().toLocaleTimeString() }]);
        setTimeout(() => { if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight; }, 50);
    };

    const runInTerminal = async (cmd) => {
        setTermOpen(true);
        log(`$ ${cmd}`, 'cmd');
        setLoading(true);
        const token = sandboxToken;

        try {
            if (cmd.startsWith('scan file ') || cmd.startsWith('scan url ')) {
                const isUrl = cmd.startsWith('scan url ');
                const target = cmd.replace(/^scan (file|url) /, '');

                if (isUrl) {
                    const resp = await fetch(`${baseUrl}/api/v1/sandbox/scan?scan_url=${encodeURIComponent(target)}`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: '{}',
                    });
                    // Actually use the scan/url endpoint
                    const resp2 = await fetch(`${baseUrl}/api/v1/scan/url?url=${encodeURIComponent(target)}`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` },
                    });
                    const data = await resp2.json();
                    log(JSON.stringify(data, null, 2), data.result?.is_nsfw ? 'error' : 'success');
                } else {
                    log('Use the file upload button or drag & drop a file', 'warn');
                }
            } else if (cmd === 'health') {
                const resp = await fetch(`${baseUrl}/health`);
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'stats') {
                const resp = await fetch(`${baseUrl}/api/v1/stats`, { headers: { Authorization: `Bearer ${token}` } });
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'providers') {
                const resp = await fetch(`${baseUrl}/api/v1/stats/providers`, { headers: { Authorization: `Bearer ${token}` } });
                log(JSON.stringify(await resp.json(), null, 2), 'success');
            } else if (cmd === 'token') {
                log(`Sandbox token: ${token}`, 'output');
            } else if (cmd === 'help') {
                log([
                    'Commands:',
                    '  health              — check service health',
                    '  stats               — view scan statistics',
                    '  providers           — list provider metrics',
                    '  token               — show sandbox token',
                    '  scan url <url>      — scan a URL',
                    '  compare             — compare two images (delta detection)',
                    '  clear               — clear terminal',
                    '  help                — show this help',
                    '',
                    'Or upload a file with the 📎 button to scan it.',
                ].join('\n'), 'output');
            } else if (cmd === 'compare') {
                log('Upload two images to compare. Use the form below or:', 'output');
                log(`curl -X POST ${baseUrl}/api/v1/scan/compare \\\n  -H "Authorization: Bearer ${token}" \\\n  -F "file1=@image_a.jpg" \\\n  -F "file2=@image_b.jpg"`, 'output');
                // Show inline file picker
                const pickFiles = () => new Promise(resolve => {
                    const inp = document.createElement('input');
                    inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
                    inp.onchange = () => resolve(inp.files);
                    inp.click();
                });
                const files = await pickFiles();
                if (files && files.length >= 2) {
                    log(`Comparing "${files[0].name}" vs "${files[1].name}"...`, 'cmd');
                    const fd = new FormData();
                    fd.append('file1', files[0]); fd.append('file2', files[1]);
                    const resp = await fetch(`${baseUrl}/api/v1/scan/compare`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: fd,
                    });
                    const data = await resp.json();
                    const ic = data.image_comparison || {};
                    log(`Hamming distance: ${data.hamming_distance}`, 'output');
                    log(`Similarity: ${(data.similarity * 100).toFixed(1)}%`, data.similarity > 0.9 ? 'success' : 'warn');
                    log(`Pixel diff: ${ic.pixel_diff_pct || 0}%`, ic.pixel_diff_pct > 10 ? 'error' : 'success');
                    log(`Histogram correlation: ${ic.histogram_correlation || 0}`, 'output');
                    if (data.changes) log(`Changes: ${data.changes.join(', ')}`, 'warn');
                } else {
                    log('Select at least 2 files to compare.', 'warn');
                }
            } else if (cmd === 'clear') {
                setTermLog([]);
            } else {
                log(`Unknown command: ${cmd}. Type "help" for commands.`, 'warn');
            }
        } catch (e) {
            log(`Error: ${e.message}`, 'error');
        }
        setLoading(false);
    };

    const handleFileUpload = async (file) => {
        setTermOpen(true);
        log(`$ scan file "${file.name}" (${(file.size/1024).toFixed(1)}KB)`, 'cmd');
        setLoading(true);
        try {
            // Client-side pre-scan: check local metadata before uploading
            if (file.type?.startsWith('image/')) {
                const pre = await ClientHash.preScan(file);
                if (pre?.match) {
                    log(`⚡ Pre-scan match (local metadata) — phash: ${pre.phash}`, 'output');
                    log(`Result: ${pre.is_nsfw ? '🚨 NSFW' : '✅ SAFE'} | confidence: ${(pre.confidence*100).toFixed(0)}% | source: metadata`, pre.is_nsfw ? 'error' : 'success');
                    if (pre.labels?.length > 0) log(`Labels: ${pre.labels.join(', ')}`, 'warn');
                    log('Skipped upload — matched cached metadata.', 'output');
                    setLoading(false);
                    return;
                }
                if (pre && !pre.match) {
                    log(`pHash: ${pre.phash} (no local match, uploading...)`, 'output');
                }
            }
            const formData = new FormData();
            formData.append('file', file);
            const resp = await fetch(`${baseUrl}/api/v1/sandbox/scan`, {
                method: 'POST', headers: { Authorization: `Bearer ${sandboxToken}` }, body: formData,
            });
            if (resp.status === 401) {
                localStorage.removeItem('sandbox_token'); setSandboxToken('');
                log('Token expired. Refresh the page.', 'error');
            } else {
                const data = await resp.json();
                const r = data.result;
                log(`Result: ${r?.is_nsfw ? '🚨 NSFW' : '✅ SAFE'} | confidence: ${((r?.confidence||0)*100).toFixed(0)}% | providers: ${r?.providers_agree}/${r?.providers_total}`, r?.is_nsfw ? 'error' : 'success');
                if (r?.labels?.length > 0) log(`Labels: ${r.labels.join(', ')}`, 'warn');
                r?.provider_results?.forEach(pr => {
                    log(`  ${pr.provider}: ${pr.is_nsfw ? 'NSFW' : 'Safe'} (${(pr.confidence*100).toFixed(0)}%) ${pr.latency_ms}ms`, pr.is_nsfw ? 'error' : 'output');
                });
                log('---\n' + JSON.stringify(data, null, 2), 'json');
            }
        } catch (e) { log(`Error: ${e.message}`, 'error'); }
        setLoading(false);
    };

    const termColors = { cmd: 'text-gold-dark', output: 'text-muted', success: 'text-green-600', error: 'text-red-600', warn: 'text-amber-600', json: 'text-line' };

    // Simulate running code examples using the actual API
    const runExample = async (lang) => {
        setTermOpen(true);
        const token = sandboxToken;

        log(`$ [${lang}] ${he ? 'מריץ דוגמה...' : 'Running example...'}`, 'cmd');
        setLoading(true);
        try {
            // All examples do the same thing: call /health then /stats to demonstrate
            const healthResp = await fetch(`${baseUrl}/health`);
            const healthData = await healthResp.json();
            log(`# ${lang}: GET /health`, 'cmd');
            log(JSON.stringify(healthData, null, 2), 'success');

            const statsResp = await fetch(`${baseUrl}/api/v1/stats`, {
                headers: { Authorization: `Bearer ${token}` },
            });
            const statsData = await statsResp.json();
            log(`# ${lang}: GET /api/v1/stats`, 'cmd');
            log(JSON.stringify(statsData, null, 2), 'success');

            log(`\n✅ ${he ? 'ה-API עובד! עכשיו העלו קובץ עם 📎 או הריצו:' : 'API works! Now upload a file with 📎 or run:'}\n  scan url <image_url>`, 'output');
        } catch (e) { log(`Error: ${e.message}`, 'error'); }
        setLoading(false);
    };

    const tk = sandboxToken || 'YOUR_TOKEN';

    const codeExamples = [
        { title: he ? '🚀 התחלה מהירה' : '🚀 Quick Start', run: 'health',
          content: he ? <>טוקן טסט: <code className="bg-warm px-1 rounded text-green-600 text-xs select-all">{tk}</code></> : <>Test token: <code className="bg-warm px-1 rounded text-green-600 text-xs select-all">{tk}</code></>,
          code: `# ${he ? 'בדיקת תקינות' : 'Health check'}\ncurl ${baseUrl}/health\n\n# ${he ? 'סריקת קובץ' : 'Scan file'}\ncurl -X POST ${baseUrl}/api/v1/scan/file \\\n  -H "Authorization: Bearer ${tk}" \\\n  -F "file=@image.jpg"\n\n# ${he ? 'סריקת URL' : 'Scan URL'}\ncurl -X POST "${baseUrl}/api/v1/scan/url?url=https://example.com/photo.jpg" \\\n  -H "Authorization: Bearer ${tk}"` },
        { title: 'Python', run: 'python',
          code: `import requests\n\nSAFEEYE = "${baseUrl}"\nTOKEN = "${tk}"\n\n# ${he ? 'בדיקת תקינות' : 'Health check'}\nprint(requests.get(f"{SAFEEYE}/health").json())\n\n# ${he ? 'סריקת קובץ' : 'Scan file'}\nwith open("image.jpg", "rb") as f:\n    resp = requests.post(\n        f"{SAFEEYE}/api/v1/scan/file",\n        headers={"Authorization": f"Bearer {TOKEN}"},\n        files={"file": f},\n    )\nresult = resp.json()["result"]\nprint("NSFW!" if result["is_nsfw"] else "Safe")\nprint(f"Confidence: {result['confidence']}")\nprint(f"Labels: {result['labels']}")` },
        { title: 'Node.js', run: 'nodejs',
          code: `const SAFEEYE = "${baseUrl}";\nconst TOKEN = "${tk}";\n\n// ${he ? 'בדיקת תקינות' : 'Health check'}\nconst health = await fetch(\`\${SAFEEYE}/health\`).then(r => r.json());\nconsole.log(health);\n\n// ${he ? 'סריקת קובץ' : 'Scan file'}\nconst fs = require("fs");\nconst form = new FormData();\nform.append("file", fs.createReadStream("image.jpg"));\nconst resp = await fetch(\`\${SAFEEYE}/api/v1/scan/file\`, {\n  method: "POST",\n  headers: { Authorization: \`Bearer \${TOKEN}\` },\n  body: form,\n});\nconst { result } = await resp.json();\nconsole.log(result.is_nsfw ? "NSFW!" : "Safe");` },
        { title: 'Telegram Bot', run: 'telegram',
          code: `import aiohttp\n\nSAFEEYE = "${baseUrl}"\nTOKEN = "${tk}"\n\nasync def is_safe(file_path: str) -> bool:\n    """${he ? 'בדיקה אם קובץ בטוח לפני שליחה למשתמש' : 'Check if file is safe before sending to user'}"""\n    async with aiohttp.ClientSession() as session:\n        with open(file_path, "rb") as f:\n            data = aiohttp.FormData()\n            data.add_field("file", f, filename="check.jpg")\n            async with session.post(\n                f"{SAFEEYE}/api/v1/scan/file",\n                data=data,\n                headers={"Authorization": f"Bearer {TOKEN}"},\n            ) as resp:\n                result = (await resp.json())["result"]\n                return not result["is_nsfw"]\n\n# ${he ? 'בהנדלר של הבוט:' : 'In your bot handler:'}\nif await is_safe(downloaded_file):\n    await bot.send_document(chat_id, downloaded_file)\nelse:\n    os.remove(downloaded_file)\n    await bot.send_message(chat_id, "Blocked by SafeEyes")` },
        { title: 'Go', run: 'go',
          code: `package main\n\nimport (\n    "bytes"\n    "fmt"\n    "io"\n    "mime/multipart"\n    "net/http"\n    "os"\n    "encoding/json"\n)\n\nconst SAFEEYE = "${baseUrl}"\nconst TOKEN = "${tk}"\n\nfunc scanFile(path string) (map[string]interface{}, error) {\n    file, _ := os.Open(path)\n    defer file.Close()\n\n    body := &bytes.Buffer{}\n    writer := multipart.NewWriter(body)\n    part, _ := writer.CreateFormFile("file", path)\n    io.Copy(part, file)\n    writer.Close()\n\n    req, _ := http.NewRequest("POST", SAFEEYE+"/api/v1/scan/file", body)\n    req.Header.Set("Authorization", "Bearer "+TOKEN)\n    req.Header.Set("Content-Type", writer.FormDataContentType())\n\n    resp, err := http.DefaultClient.Do(req)\n    if err != nil { return nil, err }\n    defer resp.Body.Close()\n\n    var result map[string]interface{}\n    json.NewDecoder(resp.Body).Decode(&result)\n    return result, nil\n}` },
        { title: 'PHP', run: 'php',
          code: `<?php\n$SAFEEYE = "${baseUrl}";\n$TOKEN = "${tk}";\n\n// ${he ? 'סריקת קובץ' : 'Scan file'}\n$ch = curl_init("$SAFEEYE/api/v1/scan/file");\ncurl_setopt_array($ch, [\n    CURLOPT_POST => true,\n    CURLOPT_RETURNTRANSFER => true,\n    CURLOPT_HTTPHEADER => ["Authorization: Bearer $TOKEN"],\n    CURLOPT_POSTFIELDS => [\n        'file' => new CURLFile('image.jpg')\n    ],\n]);\n$response = json_decode(curl_exec($ch), true);\ncurl_close($ch);\n\n$result = $response['result'];\necho $result['is_nsfw'] ? "NSFW!" : "Safe";\necho "\\nConfidence: " . $result['confidence'];\necho "\\nLabels: " . implode(', ', $result['labels']);\n?>` },
        { title: 'Ruby', run: 'ruby',
          code: `require 'net/http'\nrequire 'json'\nrequire 'uri'\n\nSAFEEYE = "${baseUrl}"\nTOKEN = "${tk}"\n\n# ${he ? 'סריקת קובץ' : 'Scan file'}\nuri = URI("#{SAFEEYE}/api/v1/scan/file")\nreq = Net::HTTP::Post::Multipart.new(\n  uri.path,\n  "file" => UploadIO.new("image.jpg", "image/jpeg")\n)\nreq["Authorization"] = "Bearer #{TOKEN}"\n\nresp = Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |http|\n  http.request(req)\n}\n\nresult = JSON.parse(resp.body)["result"]\nputs result["is_nsfw"] ? "NSFW!" : "Safe"` },
        { title: 'Rust', run: 'rust',
          code: `use reqwest;\nuse serde_json::Value;\n\nconst SAFEEYE: &str = "${baseUrl}";\nconst TOKEN: &str = "${tk}";\n\n#[tokio::main]\nasync fn main() -> Result<(), Box<dyn std::error::Error>> {\n    let client = reqwest::Client::new();\n\n    // ${he ? 'סריקת קובץ' : 'Scan file'}\n    let file = tokio::fs::read("image.jpg").await?;\n    let part = reqwest::multipart::Part::bytes(file)\n        .file_name("image.jpg");\n    let form = reqwest::multipart::Form::new()\n        .part("file", part);\n\n    let resp: Value = client.post(&format!("{}/api/v1/scan/file", SAFEEYE))\n        .header("Authorization", format!("Bearer {}", TOKEN))\n        .multipart(form)\n        .send().await?\n        .json().await?;\n\n    let is_nsfw = resp["result"]["is_nsfw"].as_bool().unwrap();\n    println!("{}", if is_nsfw { "NSFW!" } else { "Safe" });\n    Ok(())\n}` },
        { title: 'Java', run: 'java',
          code: `import java.net.http.*;\nimport java.nio.file.*;\n\nString SAFEEYE = "${baseUrl}";\nString TOKEN = "${tk}";\n\n// ${he ? 'סריקת קובץ' : 'Scan file'}\nvar boundary = "----SafeEyes";\nvar body = "--" + boundary + "\\r\\n"\n    + "Content-Disposition: form-data; name=\\"file\\"; "\n    + "filename=\\"image.jpg\\"\\r\\n"\n    + "Content-Type: image/jpeg\\r\\n\\r\\n";\n\nvar fileBytes = Files.readAllBytes(Path.of("image.jpg"));\nvar end = "\\r\\n--" + boundary + "--\\r\\n";\n\nvar request = HttpRequest.newBuilder()\n    .uri(URI.create(SAFEEYE + "/api/v1/scan/file"))\n    .header("Authorization", "Bearer " + TOKEN)\n    .header("Content-Type", "multipart/form-data; boundary=" + boundary)\n    .POST(HttpRequest.BodyPublishers.ofByteArrays(\n        List.of(body.getBytes(), fileBytes, end.getBytes())))\n    .build();\n\nvar response = HttpClient.newHttpClient()\n    .send(request, HttpResponse.BodyHandlers.ofString());\nSystem.out.println(response.body());` },
        { title: he ? '📋 Endpoints' : '📋 Endpoints', run: 'help',
          code: `POST /api/v1/scan/file          ${he ? 'סריקת קובץ' : 'scan uploaded file'}\nPOST /api/v1/scan/url?url=...   ${he ? 'סריקת URL' : 'scan a URL'}\nGET  /api/v1/scan/{id}          ${he ? 'תוצאת סריקה' : 'get scan result'}\nPOST /api/v1/feedback/{id}      ${he ? 'משוב על דיוק' : 'accuracy feedback'}\nGET  /api/v1/stats              ${he ? 'סטטיסטיקות' : 'overview stats'}\nGET  /api/v1/stats/providers    ${he ? 'מדדי ספקים' : 'provider metrics'}\nGET  /api/v1/stats/history      ${he ? 'היסטוריה' : 'scan history'}\nPOST /api/v1/admin/tokens       ${he ? 'יצירת טוקן (master)' : 'create token (master)'}\nPOST /api/v1/scan/compare       ${he ? 'השוואת שתי תמונות' : 'compare two images (delta)'}
GET  /health                    ${he ? 'בדיקת תקינות' : 'health check'}` },
    ];

    return (
        <div className={`flex ${termOpen ? 'gap-4' : ''} transition-all`}>
            {/* Left: Docs */}
            <div className={`space-y-6 ${termOpen ? 'w-1/2' : 'w-full'} transition-all`}>
                {/* Hero */}
                <div className="card p-8 text-center" style={{ background: 'linear-gradient(135deg, #FAF9F7 0%, #F0EDE8 100%)' }}>
                    <div className="text-4xl mb-3">📚</div>
                    <h2 className="text-2xl font-bold" style={{ fontFamily: 'Playfair Display, serif' }}>API {he ? 'תיעוד' : 'Documentation'}</h2>
                    <p className="text-muted text-sm mt-2">{he ? 'לחצו "▶ בדוק" כדי לנסות בטרמינל בצד' : 'Click "▶ Test" to try in the side terminal'}</p>
                    {!termOpen && <button className="btn btn-blue mt-4 text-sm" onClick={() => { setTermOpen(true); runInTerminal('help'); }}>🖥 {he ? 'פתח טרמינל' : 'Open Terminal'}</button>}
                </div>

                {/* Code examples as cards grid */}
                <div className={`grid ${termOpen ? 'grid-cols-1' : 'grid-cols-1 sm:grid-cols-2'} gap-4`}>
                    {codeExamples.map((s, i) => (
                        <div key={i} className="card p-5 flex flex-col">
                            <div className="flex items-center gap-2 mb-3">

                            </button>
                        </div>
                    ))}
                </div>
            </div>

            {/* Right: Terminal */}
            {termOpen && (
                <div className="w-1/2 sticky top-4 self-start fade-in">
                    <div className="card overflow-hidden flex flex-col" style={{ height: 'calc(100vh - 120px)', maxHeight: '80vh' }}>
                        <div className="px-4 py-3 flex justify-between items-center border-b border-line shrink-0" style={{ background: '#1A1A1A' }}>
                            <span className="text-sm font-medium text-gray-300">🖥 Terminal <span className="text-gold text-xs">(sandbox)</span></span>

                                {['health', 'stats', 'providers', 'compare', 'help'].map(cmd => (
                                    <button key={cmd} onClick={() => runInTerminal(cmd)} style={{ background:'none',border:'1px solid #444',borderRadius:6,padding:'4px 10px',margin:'2px 4px',cursor:'pointer',color:'#C9A962',fontSize:'11px',fontFamily:'monospace' }}>{cmd}</button>

                            {termLog.map((l, i) => (
                                <div key={i} className={`${termColors[l.type] || 'text-muted'} whitespace-pre-wrap mb-1 break-all ${l.type === 'json' ? 'max-h-40 overflow-y-auto overflow-x-auto text-[10px]' : ''}`}>{l.text}</div>

                        <div className="border-t border-line px-2 pt-1 flex gap-1 flex-wrap shrink-0" style={{ background: '#1A1A1A' }}>
                            {['health','stats','providers','compare','clear'].map(cmd => (
                                <button key={cmd} onClick={() => runInTerminal(cmd)} disabled={loading}

                            ))}
                        </div>
                        <div className="border-t border-line p-2 flex gap-2 shrink-0" style={{ background: '#1A1A1A' }}>
                            <label className="btn btn-gray text-xs cursor-pointer px-2">

                                <input type="file" accept="image/*,video/*" className="hidden" onChange={e => e.target.files[0] && handleFileUpload(e.target.files[0])} />
                            </label>
                            <input className="flex-1 bg-transparent border border-line rounded px-2 py-1 text-xs text-ink font-mono focus:outline-none focus:border-blue-500"
                                placeholder={he ? 'הקלד פקודה... (help לעזרה)' : 'Type command... (help for commands)'}
                                value={termInput} onChange={e => setTermInput(e.target.value)}

                    </div>
                </div>
            )}
        </div>
    );
}

function TelegramVerify({ api, i18n }) {
    const he = i18n.lang === 'he';
    const [tgStatus, setTgStatus] = useState(null);
    const [botToken, setBotToken] = useState('');
    const [verifyData, setVerifyData] = useState(null);
    const [checking, setChecking] = useState(false);
    const [msg, setMsg] = useState('');
    const [fieldErr, setFieldErr] = useState(false);

    useEffect(() => { api.fetchApi('/api/v1/admin/telegram/status').then(setTgStatus).catch(() => {}); }, []);

    const startVerify = async () => {
        if (!botToken.trim()) { setFieldErr(true); return; }
        setFieldErr(false);
        setMsg(he ? '⏳ בודק טוקן...' : '⏳ Validating token...');
        const res = await api.postApi('/api/v1/admin/telegram/start-verify', { bot_token: botToken });
        if (res.status === 'ok') {
            setVerifyData(res);
            setMsg('');
        } else {
            setMsg(`❌ ${res.message}`);
        }
    };

    const checkVerify = async () => {
        if (!verifyData) return;
        setChecking(true);
        const res = await api.postApi('/api/v1/admin/telegram/check-verify', { code: verifyData.code });
        if (res.status === 'verified') {
            setMsg(`✅ ${he ? 'אומת!' : 'Verified!'} @${res.admin_user}`);
            setVerifyData(null);
            api.fetchApi('/api/v1/admin/telegram/status').then(setTgStatus);
        } else if (res.status === 'waiting') {
            setMsg(he ? '⏳ הקוד עדיין לא התקבל. שלחו אותו לבוט.' : '⏳ Code not received yet. Send it to the bot.');
        } else {
            setMsg(`❌ ${res.message}`);
        }
        setChecking(false);
    };

    return (
        <div className="card p-4">
            <div className="flex justify-between items-center mb-2">
                <h3 className="font-medium">🤖 {he ? 'אימות טלגרם' : 'Telegram Verification'}</h3>
                {tgStatus?.verified && <span className="px-2 py-0.5 rounded text-xs text-white badge-safe">{he ? 'מאומת' : 'Verified'}</span>}
            </div>
            <p className="text-muted/70 text-xs mb-3">{he
                ? 'חברו בוט טלגרם לקבלת התראות — כל התחברות לדשבורד תשלח הודעה.'
                : 'Connect a Telegram bot for alerts — every dashboard login triggers a notification.'}</p>

            {tgStatus?.verified ? (
                <div className="text-sm text-muted">
                    <div className="detail-row"><span className="detail-label">Bot</span><span className="detail-value">@{tgStatus.bot_username}</span></div>
                    <div className="detail-row"><span className="detail-label">Admin</span><span className="detail-value">@{tgStatus.admin_user}</span></div>
                </div>
            ) : !verifyData ? (
                <div className="space-y-2">
                    <p className="text-muted text-xs">{he
                        ? <>1. צרו בוט ב-<a href="https://t.me/BotFather" target="_blank" className="text-gold-dark">@BotFather</a> 2. הדביקו את הטוקן</>
                        : <>1. Create a bot via <a href="https://t.me/BotFather" target="_blank" className="text-gold-dark">@BotFather</a> 2. Paste the token</>}</p>
                    <div>
                        <input className={`input ${fieldErr ? 'border-red-500' : ''}`} placeholder="123456:ABCdef..." value={botToken}
                            onChange={e => { setBotToken(e.target.value); setFieldErr(false); }} dir="ltr" />
                        {fieldErr && <p className="text-red-600 text-xs mt-0.5">{he ? 'שדה חובה' : 'Required'}</p>}
                    </div>
                    <button className="btn btn-green" onClick={startVerify}>{he ? 'אמת' : 'Verify'}</button>
                </div>
            ) : (
                <div className="space-y-2">
                    <div className="bg-warm rounded p-3 text-center">
                        <p className="text-muted text-sm mb-2">{he ? 'שלחו את הקוד הזה לבוט:' : 'Send this code to the bot:'}</p>
                        <p className="text-3xl font-bold text-gold-dark font-mono select-all">{verifyData.code}</p>
                        <a href={`https://t.me/${verifyData.bot_username}`} target="_blank" className="text-gold-dark text-sm mt-2 inline-block">

                        </a>
                    </div>
                    <button className={`btn btn-blue w-full ${checking ? 'opacity-50' : ''}`} disabled={checking} onClick={checkVerify}>
                        {checking ? '⏳' : '🔍'} {he ? 'בדוק אם הקוד התקבל' : 'Check if code received'}
                    </button>

            )}

            {msg && <div className="text-sm mt-2">{msg}</div>}

    );
}

function PathSetup({ api, i18n, baseDomain, pathPrefix, port, onDone }) {
    const he = i18n.lang === 'he';
    const [phase, setPhase] = useState('idle'); // idle, detecting, found, custom, applying, done
    const [detectedFile, setDetectedFile] = useState('');
    const [customFile, setCustomFile] = useState('');
    const [msg, setMsg] = useState('');

    const detect = async () => {
        setPhase('detecting');
        setMsg(he ? '⏳ מחפש קובץ nginx...' : '⏳ Searching nginx config...');
        const res = await api.postApi('/api/v1/admin/domain/detect-nginx', { domain: baseDomain });
        if (res.status === 'found') {
            setDetectedFile(res.config_file);
            setPhase('found');
            setMsg('');
        } else {
            setPhase('custom');
            setMsg(he ? '⚠️ קובץ לא נמצא. הזינו את הנתיב ידנית:' : '⚠️ Config not found. Enter path manually:');
        }
    };

    const apply = async (configFile) => {
        setPhase('applying');
        setMsg(he ? '⏳ מוסיף הגדרה...' : '⏳ Applying config...');
        const res = await api.postApi('/api/v1/admin/domain/setup-path', { domain: baseDomain, path: pathPrefix, config_file: configFile });
        if (res.status === 'ok') {
            setPhase('done');
            setMsg(`✅ ${he ? 'הוגדר בהצלחה!' : 'Configured!'} ${res.url}`);
            onDone(`${baseDomain}/${pathPrefix}`);
        } else if (res.status === 'exists') {
            setPhase('done');
            setMsg(`✅ ${he ? 'כבר מוגדר!' : 'Already configured!'}`);
            onDone(`${baseDomain}/${pathPrefix}`);
        } else if (res.status === 'permission_denied' || res.status === 'manual_required') {
            setMsg(`⚠️ ${he ? 'צריך הרשאות. הריצו:' : 'Needs sudo. Run:'}\n${res.command || ''}`);
            setPhase('idle');
        } else {
            setMsg(`❌ ${res.message || 'Failed'}`);
            setPhase('idle');
        }
    };

    useEffect(() => { if (baseDomain && pathPrefix) detect(); }, [baseDomain, pathPrefix]);

    return (
        <div className="fade-in space-y-3">
            {phase === 'detecting' && <div className="text-sm text-muted">{msg}</div>}

            {phase === 'found' && (
                <div className="bg-warm rounded-lg p-4">
                    <p className="text-sm font-medium mb-2">{he ? '📁 נמצא קובץ תצורה:' : '📁 Found config file:'}</p>
                    <div className="bg-ink rounded p-2 font-mono text-xs text-gray-300 mb-3" dir="ltr">{detectedFile}</div>
                    <p className="text-muted text-xs mb-3">{he ? 'זה הקובץ הנכון?' : 'Is this the correct file?'}</p>
                    <div className="flex gap-2">
                        <button className="btn btn-green flex-1" onClick={() => apply(detectedFile)}>
                            ✅ {he ? 'כן, הוסף הגדרה' : 'Yes, apply'}
                        </button>
                        <button className="btn btn-gray flex-1" onClick={() => { setPhase('custom'); setMsg(''); }}>
                            ❌ {he ? 'לא, אבחר קובץ אחר' : 'No, choose different'}
                        </button>
                    </div>
                </div>
            )}

            {phase === 'custom' && (
                <div className="bg-warm rounded-lg p-4">
                    {msg && <p className="text-sm text-amber-600 mb-2">{msg}</p>}
                    <p className="text-sm mb-2">{he ? 'הזינו את הנתיב לקובץ nginx:' : 'Enter the nginx config file path:'}</p>
                    <input className="input mb-2" dir="ltr" placeholder="/etc/nginx/sites-enabled/example.com"
                        value={customFile} onChange={e => setCustomFile(e.target.value)} />
                    <button className="btn btn-green w-full" disabled={!customFile.trim()} onClick={() => apply(customFile.trim())}>
                        ⚡ {he ? 'הוסף הגדרה לקובץ' : 'Apply to this file'}
                    </button>
                </div>
            )}

            {phase === 'applying' && <div className="text-sm text-muted">{msg}</div>}
            {phase === 'done' && <div className="text-sm text-green-600">{msg}</div>}
            {phase === 'idle' && msg && <div className="card p-3 text-sm whitespace-pre-line">{msg}</div>}

            <details className="text-xs text-muted">
                <summary className="cursor-pointer">{he ? 'הצג הגדרה ידנית' : 'Show manual config'}</summary>
                <div className="bg-ink rounded p-3 font-mono text-xs text-gray-300 mt-2 overflow-x-auto" dir="ltr">
                    <pre>{`location /${pathPrefix} {
    proxy_pass http://127.0.0.1:${port}/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
}`}</pre>
                </div>
            </details>
        </div>
    );
}
