<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 120px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .settings-btn {
      margin-left: auto;
      cursor: pointer;
      color: #64748b;
      font-size: 18px;
      background: none;
      border: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .header .settings-btn:hover { background: #e2e8f0; }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 24px 0;
    }
    .scanning {
      text-align: center;
      color: #6366f1;
      padding: 20px 0;
    }
    .scanning .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #c7d2fe;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .result-card.safe {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    .result-card.nsfw {
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
    .result-card.error {
      background: #fefce8;
      border: 1px solid #fde68a;
    }

    .verdict {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .safe .verdict { color: #16a34a; }
    .nsfw .verdict { color: #dc2626; }
    .error .verdict { color: #d97706; }

    .meta { color: #475569; font-size: 12px; line-height: 1.6; }
    .meta strong { color: #1e293b; }

    .labels {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .label-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .safe .label-tag { background: #dcfce7; color: #15803d; }
    .nsfw .label-tag { background: #fee2e2; color: #991b1b; }

    .url-preview {
      margin-top: 8px;
      font-size: 11px;
      color: #94a3b8;
      word-break: break-all;
      max-height: 32px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .providers {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .providers summary {
      font-size: 11px;
      color: #64748b;
      cursor: pointer;
      user-select: none;
    }
    .provider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #475569;
      padding: 2px 0;
    }
    .provider-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="">
    <h1>SafeEye</h1>
    <button class="settings-btn" id="openSettings" title="Settings">&#9881;</button>
  </div>
  <div id="content">
    <div class="empty">Right-click an image and choose<br><strong>"Scan with SafeEye"</strong></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
